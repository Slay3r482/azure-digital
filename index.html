<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Azure Digital | EREMBY System</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* EREMBY UI Components */
        .eremby-card { background: #0d0d0d; border: 1px solid #161616; border-radius: 1rem; transition: 0.3s; }
        .eremby-card:hover { border-color: #2563eb; transform: translateY(-3px); }
        
        .btn-primary { background: #fff; color: #000; padding: 12px; border-radius: 0.8rem; font-weight: 900; text-transform: uppercase; font-size: 11px; width: 100%; transition: 0.2s; cursor: pointer; text-align: center; border: none; }
        .btn-primary:hover { background: #e5e5e5; transform: scale(1.02); }
        
        .tab-item { background: #0d0d0d; border: 1px solid #161616; padding: 10px 20px; border-radius: 0.8rem; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #666; transition: 0.3s; }
        .tab-item.active { background: #fff; color: #000; border-color: #fff; }

        .input-eremby { background: #121212; border: 1px solid #1a1a1a; border-radius: 0.8rem; padding: 14px; width: 100%; color: #fff; outline: none; font-size: 12px; }
        .input-eremby:focus { border-color: #2563eb; }

        .qty-selector { background: #080808; border: 1px solid #1a1a1a; border-radius: 0.6rem; display: flex; align-items: center; }
        .qty-btn { padding: 4px 10px; font-weight: bold; color: #444; transition: 0.2s; }
        .qty-btn:hover { color: #fff; }
        
        .hidden { display: none !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 py-5 px-6 bg-[#050505]/95 backdrop-blur-md border-b border-zinc-900">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
                <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                    <i class="fa-solid fa-bolt text-white"></i>
                </div>
                <span class="font-black italic uppercase text-2xl tracking-tighter">Azure <span class="text-blue-500">Digital</span></span>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="showPage('cart')" class="bg-white text-black px-6 py-2.5 rounded-2xl font-black text-xs flex items-center gap-2 transition hover:bg-zinc-200">
                    <i class="fa-solid fa-cart-shopping"></i> Carrinho <span id="cart-count" class="bg-black text-white px-2 py-0.5 rounded-lg text-[10px]">0</span>
                </button>
                <button class="bg-zinc-900 border border-zinc-800 px-6 py-2.5 rounded-2xl font-black uppercase italic text-xs hover:bg-zinc-800">Entrar</button>
            </div>
        </div>
    </nav>

    <div id="page-home">
        <header class="max-w-7xl mx-auto px-6 pt-16 pb-8">
            <div class="mb-10">
                <h1 class="text-6xl font-black italic uppercase tracking-tighter leading-none mb-4">EREMBY<br><span class="text-blue-600">SYSTEM V1</span></h1>
                <p class="text-zinc-500 text-sm max-w-sm">Entrega automática e imediata. Escolha sua categoria abaixo.</p>
            </div>
            
            <div class="flex flex-wrap gap-3 mb-10" id="tabs-container">
                <div class="tab-item active" onclick="renderByCat('Todos')">Todos</div>
                <div class="tab-item" onclick="renderByCat('Streaming')">Streaming</div>
                <div class="tab-item" onclick="renderByCat('IA Tools')">IA Tools</div>
                <div class="tab-item" onclick="renderByCat('Games')">Games</div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 pb-24">
            <div id="grid-products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <div id="page-cart" class="hidden">
        <section class="max-w-7xl mx-auto px-6 py-16">
            <div class="mb-12">
                <h2 class="text-3xl font-black italic uppercase italic">Checkout</h2>
                <p class="text-zinc-500 text-sm">Finalize seu pedido com Pix.</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                <div class="lg:col-span-4 eremby-card p-8">
                    <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-6 tracking-widest">Pagamento</h3>
                    <div class="space-y-4">
                        <div class="flex items-center gap-3 p-4 bg-blue-600/5 border border-blue-600/20 rounded-xl">
                            <i class="fa-brands fa-pix text-emerald-400"></i>
                            <span class="text-sm font-bold">Pix (Automático)</span>
                        </div>
                        <input type="email" id="user-email" placeholder="E-mail para receber o produto" class="input-eremby">
                    </div>
                </div>

                <div class="lg:col-span-5 eremby-card p-8">
                    <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-6 tracking-widest">Itens no Carrinho</h3>
                    <div id="cart-list" class="space-y-4"></div>
                </div>

                <div class="lg:col-span-3 eremby-card p-8">
                    <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-6 tracking-widest">Resumo</h3>
                    <div class="pt-4 border-t border-zinc-900 flex justify-between items-baseline mb-8">
                        <span class="text-sm font-black italic">TOTAL</span>
                        <span id="cart-total" class="text-3xl font-black italic text-blue-500">R$ 0,00</span>
                    </div>
                    <button class="btn-primary !py-5" onclick="alert('Sistema de Pix em manutenção!')">Finalizar Compra</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        const products = [
            { id: 1, name: "Youtube Premium 30D", price: 1.50, cat: "Streaming", img: "https://cdn-icons-png.flaticon.com/512/1384/1384060.png" },
            { id: 2, name: "Google Veo 3", price: 4.99, cat: "IA Tools", img: "https://cdn-icons-png.flaticon.com/512/2991/2991148.png" },
            { id: 3, name: "ChatGPT Plus Shared", price: 2.30, cat: "IA Tools", img: "https://static.cdnlogo.com/logos/o/38/openai-chatgpt.png" },
            { id: 4, name: "Xbox Game Pass", price: 9.90, cat: "Games", img: "https://cdn-icons-png.flaticon.com/512/588/588308.png" },
            { id: 5, name: "Netflix 4K Ultra", price: 12.00, cat: "Streaming", img: "https://cdn-icons-png.flaticon.com/512/732/732228.png" }
        ];

        let cart = [];

        function renderByCat(cat) {
            // Update tabs
            document.querySelectorAll('.tab-item').forEach(t => {
                t.classList.toggle('active', t.innerText === cat);
            });

            const grid = document.getElementById('grid-products');
            const filtered = cat === 'Todos' ? products : products.filter(p => p.cat === cat);
            
            grid.innerHTML = filtered.map(p => `
                <div class="eremby-card p-5 flex flex-col">
                    <div class="w-full h-32 bg-zinc-950 rounded-2xl mb-5 flex items-center justify-center p-6 border border-zinc-900/30">
                        <img src="${p.img}" class="max-h-full opacity-80">
                    </div>
                    <div class="text-[9px] font-black uppercase text-blue-500 mb-1 tracking-widest">${p.cat}</div>
                    <h3 class="text-xs font-bold mb-4">${p.name}</h3>
                    <div class="mt-auto">
                        <div class="text-2xl font-black italic mb-5">R$ ${p.price.toFixed(2).replace('.', ',')}</div>
                        <button onclick="addToCart(${p.id})" class="btn-primary">Adicionar</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = cart.find(i => i.id === id);
            if(item) item.qty++;
            else cart.push({...products.find(p => p.id === id), qty: 1});
            updateCartUI();
            showPage('cart');
        }

        function changeQty(idx, delta) {
            cart[idx].qty += delta;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        }

        function updateCartUI() {
            let total = 0; let count = 0;
            const list = document.getElementById('cart-list');
            
            list.innerHTML = cart.map((item, i) => {
                total += (item.price * item.qty); count += item.qty;
                return `
                <div class="flex justify-between items-center p-4 bg-zinc-900/30 border border-zinc-900 rounded-xl">
                    <div class="flex items-center gap-3">
                        <img src="${item.img}" class="w-8 h-8 object-contain">
                        <div>
                            <div class="text-[10px] font-black italic uppercase">${item.name}</div>
                            <div class="text-[8px] text-zinc-500 uppercase">Unitário: R$ ${item.price.toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="qty-selector">
                            <button onclick="changeQty(${i}, -1)" class="qty-btn">-</button>
                            <span class="text-[10px] font-black px-2">${item.qty}</span>
                            <button onclick="changeQty(${i}, 1)" class="qty-btn">+</button>
                        </div>
                        <button onclick="changeQty(${i}, -999)" class="text-zinc-700 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function showPage(p) {
            document.getElementById('page-home').classList.toggle('hidden', p !== 'home');
            document.getElementById('page-cart').classList.toggle('hidden', p !== 'cart');
            window.scrollTo(0,0);
        }

        window.onload = () => renderByCat('Todos');
    </script>
</body>
</html>
