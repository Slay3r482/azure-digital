<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Eremby</title>
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --border: #1a1a1a; --accent: #2563eb; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 1.25rem; transition: 0.2s; }
        .card:hover { border-color: var(--accent); }
        
        /* Botão Carrinho com Bolinha */
        .cart-btn { position: relative; background: #fff; color: #000; padding: 10px 24px; border-radius: 0.8rem; font-weight: 800; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; cursor: pointer; border: none; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #fff; color: #000; border: 2px solid #050505; min-width: 20px; height: 20px; border-radius: 50%; display: flex; items-center: center; justify-content: center; font-size: 10px; font-weight: 900; }
        
        .btn-entrar { background: #1a1a1a; color: #fff; padding: 10px 24px; border-radius: 0.8rem; font-weight: 600; font-size: 0.8rem; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
        .btn-entrar:hover { background: #222; }

        /* Modal Login */
        #modal-login { background: rgba(0,0,0,0.95); backdrop-blur: 8px; }
        .login-card { background: #080808; border: 1px solid #111; width: 100%; max-w-md; padding: 40px; border-radius: 2rem; text-align: center; }
        .social-btn { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 14px; border-radius: 1rem; width: 100%; display: flex; items-center: center; justify-content: center; gap: 10px; font-weight: 600; font-size: 0.85rem; margin-bottom: 12px; transition: 0.2s; }
        .social-btn:hover { border-color: var(--accent); }
        
        .input-email { background: #eef2ff; color: #000; border-radius: 1rem; padding: 16px; width: 100%; outline: none; font-weight: 600; margin-bottom: 20px; }
        .btn-submit { background: #1a1a1a; color: #888; padding: 16px; border-radius: 1rem; width: 100%; font-weight: 900; font-style: italic; text-transform: uppercase; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-[#050505] border-b border-[#111] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-white"></i>
                </div>
                <span class="text-2xl font-black italic uppercase italic">Azure <span class="text-blue-600">Digital</span></span>
            </div>
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-headset text-zinc-400 text-lg"></i>
                <div onclick="navigate('cart')" class="cart-btn">
                    <i class="fa-solid fa-bag-shopping"></i> Carrinho
                    <div id="badge" class="cart-badge">0</div>
                </div>
                <button onclick="openLogin()" class="btn-entrar">Entrar</button>
            </div>
        </div>
    </nav>

    <div id="modal-login" class="fixed inset-0 z-[100] flex items-center justify-center hidden p-6">
        <div class="login-card relative">
            <button onclick="closeLogin()" class="absolute top-6 right-6 text-zinc-600 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-5xl font-black italic uppercase mb-2">ENTRAR</h2>
            <p class="text-zinc-500 text-sm mb-8">Faça login com seu endereço de e-mail</p>
            
            <button class="social-btn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Conectar com Google</button>
            <button class="social-btn text-blue-500"><i class="fa-brands fa-discord text-xl"></i> Conectar com Discord</button>
            
            <div class="my-8 flex items-center gap-4 text-zinc-700 text-[10px] font-black uppercase tracking-widest">
                <div class="h-[1px] bg-zinc-800 flex-1"></div> ou continuar com <div class="h-[1px] bg-zinc-800 flex-1"></div>
            </div>

            <div class="relative">
                <i class="fa-regular fa-envelope absolute left-5 top-5 text-zinc-900"></i>
                <input type="email" id="user-email" placeholder="natanaelpereira1541@gmail.com" class="input-email pl-12">
            </div>
            <button onclick="doLogin()" class="btn-submit">ENTRAR</button>
        </div>
    </div>

    <div id="view-home">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <h1 class="text-6xl font-black italic uppercase tracking-tighter mb-12">DESTAQUES</h1>
            <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <div id="view-cart" class="hidden">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <h2 class="text-3xl font-black uppercase italic mb-10">Carrinhos de compras</h2>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 card p-8">
                    <p class="text-[0.6rem] font-black uppercase tracking-widest text-zinc-500 mb-6">Informações de pagamento</p>
                    <div class="flex items-center gap-4 p-4 bg-blue-600/5 border border-blue-600/20 rounded-xl mb-6">
                        <i class="fa-brands fa-pix text-emerald-400 text-xl"></i>
                        <span class="text-sm font-bold uppercase">Pix</span>
                    </div>
                    <input type="email" placeholder="Informe o seu e-mail" class="bg-[#0d0d0d] border border-[#1a1a1a] rounded-xl p-4 w-full text-sm mb-4">
                    <input type="email" placeholder="Informe novamente o seu e-mail" class="bg-[#0d0d0d] border border-[#1a1a1a] rounded-xl p-4 w-full text-sm">
                </div>
                <div class="lg:col-span-5 card p-8">
                    <p class="text-[0.6rem] font-black uppercase tracking-widest text-zinc-500 mb-6">Produtos no carrinho</p>
                    <div id="cart-list" class="space-y-4"></div>
                </div>
                <div class="lg:col-span-3 card p-8 h-fit">
                    <p class="text-[0.6rem] font-black uppercase tracking-widest text-zinc-500 mb-6">Resumo da compra</p>
                    <div class="flex justify-between text-xs text-zinc-500 mb-2"><span>Subtotal</span><span id="sub-price">R$ 0,00</span></div>
                    <div class="flex justify-between text-xs text-zinc-500 mb-6"><span>Método</span><span class="text-emerald-400 font-bold">Pix</span></div>
                    <div class="flex justify-between pt-4 border-t border-[#111] mb-8">
                        <span class="font-black italic">TOTAL</span>
                        <span id="final-price" class="text-2xl font-black italic">R$ 0,00</span>
                    </div>
                    <button class="w-full bg-white text-black font-black py-4 rounded-xl uppercase" onclick="alert('Gerando Pix...')">Gerar Pagamento</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Youtube Premium", price: 1.50, color: "red" },
            { id: 2, name: "Google Veo 3", price: 4.99, color: "blue" },
            { id: 3, name: "Chat GPT Plus", price: 2.30, color: "green" }
        ];

        let cart = [];

        function renderHome() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card p-8 flex flex-col h-full text-center">
                    <div class="w-full h-32 bg-[#050505] rounded-2xl mb-8 border border-[#111]"></div>
                    <div class="flex items-center justify-center gap-2 mb-2">
                        <div class="w-2 h-2 rounded-full bg-${p.color}-500"></div>
                        <span class="text-[0.6rem] font-black text-zinc-500 uppercase tracking-widest">${p.name}</span>
                    </div>
                    <p class="text-3xl font-black italic mb-8">R$ ${p.price.toFixed(2).replace('.', ',')}</p>
                    <button onclick="addToCart(${p.id})" class="w-full bg-white text-black font-black py-3 rounded-xl uppercase text-xs">Comprar</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = cart.find(i => i.id === id);
            if(item) item.qty++;
            else cart.push({...products.find(p => p.id === id), qty: 1});
            updateUI();
            navigate('cart');
        }

        function updateUI() {
            let total = 0; let count = 0;
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map((item, i) => {
                total += (item.price * item.qty); count += item.qty;
                return `
                <div class="flex justify-between items-center p-4 bg-[#050505] border border-[#111] rounded-2xl">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-[#0d0d0d] rounded-lg"></div>
                        <div><p class="text-[0.7rem] font-black uppercase italic">${item.name}</p></div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center bg-[#0d0d0d] border border-[#1a1a1a] rounded-lg">
                            <button class="px-3 py-1 text-zinc-500" onclick="changeQty(${i}, -1)">-</button>
                            <span class="text-xs font-bold w-4 text-center">${item.qty}</span>
                            <button class="px-3 py-1 text-zinc-500" onclick="changeQty(${i}, 1)">+</button>
                        </div>
                        <span class="text-xs font-bold">R$ ${(item.price * item.qty).toFixed(2)}</span>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('badge').innerText = count;
            document.getElementById('final-price').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
            document.getElementById('sub-price').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function changeQty(idx, delta) {
            cart[idx].qty += delta;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateUI();
        }

        function openLogin() { document.getElementById('modal-login').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('modal-login').classList.add('hidden'); }
        function navigate(view) {
            document.getElementById('view-home').classList.toggle('hidden', view !== 'home');
            document.getElementById('view-cart').classList.toggle('hidden', view !== 'cart');
            window.scrollTo(0,0);
        }

        window.onload = renderHome;
    </script>
</body>
</html>
