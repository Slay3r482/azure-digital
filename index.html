<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Store</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #1a1a1a; }
        .nexus-card { background: #0d0d0d; border: 1px solid #1a1a1a; transition: 0.3s; position: relative; cursor: pointer; }
        .nexus-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.2); }
        .badge-auto { background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); color: #3b82f6; font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: 800; text-transform: uppercase; }
        .side-bar { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .modal { transition: opacity 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg shadow-lg shadow-blue-900/50"></div>
                <span class="font-bold text-xl italic tracking-tighter uppercase">Azure Digital</span>
            </div>
            
            <div class="hidden md:flex flex-1 max-w-md relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-zinc-500 text-sm"></i>
                <input type="text" placeholder="Pesquisar produto..." class="w-full bg-[#121212] border border-zinc-800 rounded-xl py-2 pl-10 pr-4 focus:outline-none focus:border-blue-500 transition text-sm">
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleModal('cart-modal')" class="bg-white text-black px-5 py-2 rounded-xl font-bold flex items-center gap-2 relative transition hover:bg-zinc-200">
                    <i class="fa-solid fa-bag-shopping"></i> Carrinho
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-blue-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center hidden border-2 border-[#050505]">0</span>
                </button>
                
                <div id="user-area" class="flex items-center gap-2">
                    <button onclick="toggleModal('login-modal')" id="btn-user-status" class="bg-zinc-800 text-white px-5 py-2 rounded-xl font-bold hover:bg-zinc-700 transition">Entrar</button>
                    <button onclick="logout()" id="btn-logout" class="hidden text-zinc-500 hover:text-red-500 transition px-2" title="Sair da conta">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="fixed right-4 top-1/2 -translate-y-1/2 flex flex-col gap-6 side-bar p-4 rounded-full z-40">
        <a href="#" class="text-zinc-400 hover:text-white transition text-xl"><i class="fa-brands fa-discord"></i></a>
        <a href="#" class="text-zinc-400 hover:text-white transition text-xl"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="text-zinc-400 hover:text-white transition text-xl"><i class="fa-brands fa-tiktok"></i></a>
    </div>

    <header class="max-w-7xl mx-auto py-20 px-6">
        <div class="flex flex-col md:flex-row items-center justify-between gap-12">
            <div class="md:w-1/2 text-center md:text-left">
                <h1 class="text-7xl font-black mb-6 leading-tight italic uppercase tracking-tighter">Azure <span class="text-blue-500 text-shadow">Digital!</span></h1>
                <p class="text-zinc-400 text-lg mb-8 max-w-lg">Sua loja premium de produtos digitais. Entrega 100% automática via Discord e E-mail.</p>
                <div class="flex gap-4 justify-center md:justify-start">
                    <button class="bg-[#121212] border border-zinc-800 px-8 py-4 rounded-2xl font-bold flex items-center gap-3 hover:bg-zinc-800 transition">
                        <i class="fa-brands fa-discord text-blue-500"></i> Suporte Discord
                    </button>
                    <button class="bg-blue-600 px-8 py-4 rounded-2xl font-bold hover:shadow-lg hover:shadow-blue-900/40 transition uppercase italic">Catálogo</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div class="mb-10 flex items-center gap-3">
            <span class="w-1.5 h-8 bg-blue-600 rounded-full"></span>
            <h2 class="text-2xl font-black italic uppercase tracking-widest">Destaques</h2>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="nexus-card rounded-[2rem] p-5">
                <div class="h-44 bg-zinc-900 rounded-2xl mb-4 relative overflow-hidden border border-zinc-800">
                    <img src="https://logodownload.org/wp-content/uploads/2014/10/youtube-logo-9.png" class="w-1/2 mx-auto mt-12 opacity-50 grayscale hover:grayscale-0 transition">
                    <span class="absolute top-3 right-3 badge-auto">⚡ Entrega Automática</span>
                </div>
                <h3 class="font-bold text-sm mb-1 uppercase italic tracking-tighter text-zinc-300">YouTube Premium - 30 Dias</h3>
                <div class="flex items-center gap-2 mb-5">
                    <span class="text-3xl font-black italic">R$ 1,50</span>
                    <i class="fa-solid fa-bolt text-blue-500 text-xs"></i>
                </div>
                <button onclick="verDetalhes('YouTube Premium', 1.50)" class="w-full bg-zinc-800/50 border border-zinc-700 text-white py-3 rounded-xl font-black hover:bg-white hover:text-black transition uppercase text-xs italic tracking-widest">Ver Detalhes</button>
            </div>
        </div>
    </main>

    <div id="login-modal" class="modal fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="toggleModal('login-modal')"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-sm p-10 bg-[#0d0d0d] border border-zinc-800 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black italic uppercase mb-2 tracking-tighter">Entrar</h2>
                <p class="text-zinc-500 text-xs font-medium">Faça login com seu endereço de e-mail</p>
            </div>

            <div class="bg-[#121212] border border-zinc-800 rounded-2xl p-5 flex items-center gap-4 mb-6 focus-within:border-blue-500 transition shadow-inner">
                <i class="fa-regular fa-envelope text-zinc-600"></i>
                <input id="login-email" type="email" placeholder="exemplo@gmail.com" class="bg-transparent w-full outline-none text-sm font-bold text-white">
            </div>

            <button onclick="fazerLogin()" class="w-full bg-[#2a2a2a] py-5 rounded-2xl font-black text-zinc-400 hover:bg-white hover:text-black transition uppercase italic tracking-widest">
                Entrar
            </button>
        </div>
    </div>

    <div id="cart-modal" class="modal fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleModal('cart-modal')"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-[#0d0d0d] border-l border-zinc-800 p-10 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Carrinho</h2>
                <button onclick="toggleModal('cart-modal')"><i class="fa-solid fa-xmark text-3xl text-zinc-600 hover:text-white transition"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
            <div class="border-t border-zinc-900 pt-8 mt-6">
                <div class="flex justify-between text-2xl font-black italic mb-8 uppercase">
                    <span>Total:</span>
                    <span id="cart-total" class="text-blue-500">R$ 0,00</span>
                </div>
                <button onclick="finalizarPagamento()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-xl transition italic uppercase shadow-xl shadow-blue-900/20">Finalizar</button>
            </div>
        </div>
    </div>

    <div id="details-modal" class="modal fixed inset-0 z-[110] hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="toggleModal('details-modal')"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl p-6 md:p-12 bg-[#0d0d0d] border border-zinc-800 rounded-[3rem] overflow-y-auto max-h-[90vh]">
            <button onclick="toggleModal('details-modal')" class="absolute top-8 right-8 text-zinc-500 hover:text-white transition"><i class="fa-solid fa-xmark text-3xl"></i></button>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <img id="detail-img" src="" class="rounded-3xl border border-zinc-800 shadow-2xl w-full">
                <div>
                    <span class="text-blue-500 text-xs font-black uppercase tracking-widest mb-4 block">+100 Vendidos</span>
                    <h2 id="detail-title" class="text-4xl font-black uppercase italic leading-none mb-6"></h2>
                    <div id="detail-price" class="text-4xl font-black italic mb-8"></div>
                    <button id="btn-comprar-agora" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase italic tracking-tighter hover:bg-zinc-200 transition">Comprar Agora</button>
                </div>
            </div>
            <div id="detail-desc" class="mt-12 pt-8 border-t border-zinc-900 text-zinc-500"></div>
        </div>
    </div>

    <script>
        let carrinho = [];
        let usuario = null;

        const infoProdutos = {
            'YouTube Premium': { img: 'https://images.squarespace-cdn.com/content/v1/5e949a92e17d55230cd1d44f/1589389274534-7X3A0Y5X6O3Z3Z3Z3Z3Z/YouTube+Premium+Logo.jpg', desc: 'Acesso Premium sem anúncios.' }
        };

        // AO CARREGAR: Verifica se já está logado
        window.onload = () => {
            const emailSalvo = localStorage.getItem('userEmail');
            if (emailSalvo) aplicarLogin(emailSalvo);
            render();
        };

        function toggleModal(id) { 
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
        }

        function fazerLogin() {
            const email = document.getElementById('login-email').value;
            if(!email.includes('@')) return alert("Insira um e-mail válido!");
            
            localStorage.setItem('userEmail', email); // SALVA LOGIN
            aplicarLogin(email);
            toggleModal('login-modal');
        }

        function aplicarLogin(email) {
            usuario = email;
            document.getElementById('btn-user-status').innerText = email.split('@')[0].toUpperCase();
            document.getElementById('btn-logout').classList.remove('hidden'); // MOSTRA BOTÃO DE SAIR
        }

        function logout() {
            if(confirm("Deseja realmente sair da conta?")) {
                localStorage.removeItem('userEmail'); // APAGA LOGIN
                location.reload(); // RECARREGA A PÁGINA
            }
        }

        function verDetalhes(nome, preco) {
            const info = infoProdutos[nome];
            document.getElementById('detail-title').innerText = nome;
            document.getElementById('detail-price').innerText = `R$ ${preco.toFixed(2)}`;
            document.getElementById('detail-img').src = info.img;
            document.getElementById('detail-desc').innerHTML = info.desc;
            document.getElementById('btn-comprar-agora').onclick = () => { toggleModal('details-modal'); adicionarAoCarrinho(nome, preco); };
            toggleModal('details-modal');
        }

        function adicionarAoCarrinho(nome, preco) {
            carrinho.push({nome, preco});
            render();
            toggleModal('cart-modal');
        }

        function render() {
            const container = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = carrinho.length;
            document.getElementById('cart-count').classList.toggle('hidden', carrinho.length === 0);
            
            container.innerHTML = carrinho.map((item, i) => `
                <div class="bg-[#121212] p-4 rounded-xl border border-zinc-800 flex justify-between">
                    <div><p class="font-bold text-xs uppercase italic">${item.nome}</p><p class="text-blue-500">R$ ${item.preco.toFixed(2)}</p></div>
                    <button onclick="remover(${i})" class="text-zinc-600 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('') || '<p class="text-center opacity-20 py-10 italic">Vazio</p>';

            const total = carrinho.reduce((acc, item) => acc + item.preco, 0);
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
        }

        function remover(i) { carrinho.splice(i, 1); render(); }

        function finalizarPagamento() {
            if(!usuario) return toggleModal('login-modal');
            alert(`Processando pedido para: ${usuario}`);
        }
    </script>
</body>
</html>
