<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Eremby Style</title>
    <style>
        :root {
            --bg-dark: #08090B;
            --header-bg: #0D0E11;
            --border-color: #201e1e;
            --accent: #ffba09; /* Cor de destaque da Eremby no scroll */
        }

        body {
            background-color: var(--bg-dark);
            color: #fffafa;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Banner com máscara igual ao original */
        .hero-banner {
            position: fixed;
            z-index: -1;
            top: 47px;
            left: 0;
            width: 100%;
            height: 100%;
            max-height: 700px;
            object-fit: cover;
            mask-image: linear-gradient(rgb(0, 0, 0), rgba(0, 0, 0, 0.39), rgba(0, 0, 0, 0));
            -webkit-mask-image: linear-gradient(rgb(0, 0, 0), rgba(0, 0, 0, 0.39), rgba(0, 0, 0, 0));
            opacity: 0.5;
        }

        /* Estilo dos Cards */
        .product-card {
            background-color: #58586910;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .product-card:hover {
            border-color: #585869;
            transform: translateY(-5px);
        }

        .category-label {
            display: inline-flex;
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            background-color: #0D0E1140;
            border: 2px solid #0D0E1140;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        /* Scrollbar customizada da Eremby */
        ::-webkit-scrollbar { width: 14px; border-left: 1px solid var(--border-color); }
        ::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
            border: 5px solid transparent;
            background-clip: padding-box;
        }
    </style>
</head>
<body>

    <img src="https://cdn.ereemby.com/attachments/17715554716225022imagem.png" class="hero-banner" alt="banner">

    <header class="sticky top-0 z-50 bg-[#0D0E11] border-b border-[#201e1e] px-6 py-3">
        <div class="max-w-[1320px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://cdn.ereemby.com/attachments/17706209715176161imagem.jpeg" class="w-8 h-8 rounded-md" alt="logo">
                <span class="font-bold text-sm tracking-tight">Azure Digital</span>
            </div>

            <div class="hidden md:flex bg-[#0D0E11] border border-[#201e1e] px-4 py-2 rounded-xl w-96 items-center gap-3">
                <i class="fa-solid fa-magnifying-glass text-[#8C8C8C] text-sm"></i>
                <input type="text" placeholder="Pesquisar produto" class="bg-transparent outline-none text-sm w-full text-[#8C8C8C]">
            </div>

            <div class="flex items-center gap-4">
                <a href="/cart" class="flex items-center gap-2 bg-white text-black px-4 py-2 rounded-md font-bold text-xs uppercase transition-transform active:scale-95">
                    <i class="fa-solid fa-bag-shopping"></i> <span>Carrinho</span>
                </a>
                <a href="/login" class="text-xs font-medium text-zinc-400 hover:text-white transition">Entrar</a>
            </div>
        </div>
    </header>

    <main class="max-w-[1280px] mx-auto px-4 py-12">
        <section class="mb-12">
            <div class="category-label uppercase tracking-widest">Assinaturas</div>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                
                <div class="product-card">
                    <div class="aspect-square bg-[#0D0E11] rounded-lg mb-4 flex items-center justify-center overflow-hidden">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" class="w-2/3 opacity-80" alt="YT">
                    </div>
                    <h3 class="text-sm font-bold mb-1">YouTube Premium</h3>
                    <p class="text-[10px] text-zinc-500 uppercase font-black mb-3">Entrega Imediata</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-lg font-black text-white">R$ 15,90</span>
                        <button class="bg-white text-black p-2 rounded-lg hover:scale-105 transition">
                            <i class="fa-solid fa-cart-plus"></i>
                        </button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="aspect-square bg-[#0D0E11] rounded-lg mb-4 flex items-center justify-center overflow-hidden">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="w-2/3 opacity-80" alt="Netflix">
                    </div>
                    <h3 class="text-sm font-bold mb-1">Netflix 4K Screen</h3>
                    <p class="text-[10px] text-zinc-500 uppercase font-black mb-3">Estoque: 15</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-lg font-black text-white">R$ 12,00</span>
                        <button class="bg-white text-black p-2 rounded-lg hover:scale-105 transition">
                            <i class="fa-solid fa-cart-plus"></i>
                        </button>
                    </div>
                </div>

            </div>
        </section>

        <footer class="mt-20 border-t border-[#201e1e] pt-10 flex flex-col md:flex-row justify-between gap-8 text-[#8C8C8C]">
            <div class="max-w-xs">
                <div class="flex items-center gap-2 mb-4 text-white">
                    <img src="https://cdn.ereemby.com/attachments/17706209715176161imagem.jpeg" class="w-6 h-6 rounded" alt="">
                    <span class="font-bold">Azure Digital</span>
                </div>
                <p class="text-xs leading-relaxed">Focada em oferecer uma experiência clara, eficiente e confiável em cada transação.</p>
            </div>
            
            <div class="flex gap-12">
                <div class="flex flex-col gap-2">
                    <span class="text-white text-xs font-bold uppercase mb-2">Páginas</span>
                    <a href="#" class="text-xs hover:text-white">Termos de uso</a>
                    <a href="#" class="text-xs hover:text-white">Políticas</a>
                </div>
                <div class="flex flex-col gap-2">
                    <span class="text-white text-xs font-bold uppercase mb-2">Redes Sociais</span>
                    <div class="flex gap-4">
                        <i class="fa-brands fa-discord hover:text-white cursor-pointer"></i>
                        <i class="fa-brands fa-instagram hover:text-white cursor-pointer"></i>
                    </div>
                </div>
            </div>
        </footer>
    </main>

</body>
</html>
