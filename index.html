<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Nexus Style</title>
    <style>
        :root { --bg-dark: #050505; --card: #080808; --border: #111; }
        body { background-color: var(--bg-dark); color: #fffafa; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-nexus { font-family: 'Inter', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; }

        /* Banner de Fundo Dinâmico */
        .hero-banner {
            position: fixed; z-index: -1; top: 0; left: 0; width: 100%; height: 100vh;
            object-fit: cover;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.5;
        }

        /* Nav */
        .cart-pill { position: relative; background: #fff; color: #000; padding: 10px 24px; border-radius: 0.8rem; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .cart-dot { position: absolute; top: -6px; right: -6px; background: #fff; color: #000; border: 3px solid #050505; min-width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; }
        .btn-entrar { background: #1a1a1a; color: #fff; padding: 10px 24px; border-radius: 0.8rem; font-weight: 600; font-size: 14px; }

        /* Card Compacto */
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 2rem; padding: 30px; text-align: center; }
        .product-img-box { background: #050505; border: 1px solid #111; border-radius: 1.5rem; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; padding: 30px; overflow: hidden; }
        .product-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-buy { background: #fff; color: #000; width: 100%; padding: 14px; border-radius: 1rem; font-weight: 900; text-transform: uppercase; font-size: 13px; margin-top: 15px; cursor: pointer; }

        /* Categorias */
        .cat-item { background: var(--card); border: 1px solid var(--border); padding: 14px 20px; border-radius: 1rem; font-weight: 900; font-size: 11px; color: #444; text-transform: uppercase; text-align: left; transition: 0.2s; width: 100%; margin-bottom: 6px; cursor: pointer; }
        .cat-item.active { background: #fff; color: #000; border-color: #fff; }
    </style>
</head>
<body>

    <img src="https://cdn.ereemby.com/attachments/17715554716225022imagem.png" class="hero-banner" alt="banner">

    <nav class="bg-[#050505] border-b border-[#111] px-12 py-5 flex justify-between items-center sticky top-0 z-[100]">
        <div class="flex items-center gap-4 cursor-pointer" onclick="navigate('home')">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-bolt text-white text-2xl"></i>
            </div>
            <span class="text-3xl font-nexus">Azure <span class="text-blue-600">Digital</span></span>
        </div>

        <div class="hidden md:flex bg-[#080808] border border-[#111] px-6 py-3 rounded-xl w-[450px] flex items-center gap-4">
            <i class="fa-solid fa-magnifying-glass text-zinc-700"></i>
            <input type="text" placeholder="Pesquisar produto" class="bg-transparent border-none outline-none text-sm w-full">
        </div>

        <div class="flex items-center gap-6">
            <i class="fa-solid fa-headset text-zinc-500 text-2xl cursor-pointer"></i>
            <div onclick="navigate('cart')" class="cart-pill">
                <i class="fa-solid fa-bag-shopping"></i> Carrinho
                <div id="cart-count" class="cart-dot">0</div>
            </div>
            <button class="btn-entrar">Entrar</button>
        </div>
    </nav>

    <main class="max-w-[1500px] mx-auto px-12 py-16">
        <div class="flex gap-16">
            <aside class="w-72 flex-shrink-0">
                <p class="text-[11px] font-black text-zinc-700 uppercase tracking-widest mb-8">Categorias</p>
                <button class="cat-item active">Todos os produtos</button>
                <button class="cat-item">Streaming</button>
                <button class="cat-item">Ferramentas IA</button>
            </aside>

            <div class="flex-1">
                <h1 class="text-7xl font-nexus mb-16">TODOS</h1>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    
                    <div class="product-card">
                        <div class="product-img-box">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YT">
                        </div>
                        <div class="flex items-center justify-center gap-3 mb-2">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-600"></div>
                            <span class="text-xs font-black text-zinc-500 tracking-widest uppercase italic">Youtube Premium</span>
                        </div>
                        <p class="font-nexus text-4xl">R$ 1,50</p>
                        <button onclick="addToCart()" class="btn-buy">COMPRAR AGORA</button>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        let cart = 0;
        function addToCart() {
            cart++;
            document.getElementById('cart-count').innerText = cart;
        }
        function navigate(v) { alert('Abrindo ' + v); }
    </script>
</body>
</html>
