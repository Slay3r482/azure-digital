<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Azure Digital | EREMBY</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* EREMBY UI Kit */
        .eremby-card { background: #0d0d0d; border: 1px solid #161616; border-radius: 1.2rem; transition: 0.3s; }
        .eremby-card:hover { border-color: #2563eb; transform: translateY(-3px); }
        
        .btn-main { background: #fff; color: #000; padding: 14px; border-radius: 1rem; font-weight: 900; text-transform: uppercase; font-size: 11px; width: 100%; transition: 0.2s; cursor: pointer; text-align: center; border: none; }
        .btn-main:hover { background: #e5e5e5; }
        
        .tab-eremby { background: #0d0d0d; border: 1px solid #161616; padding: 12px 24px; border-radius: 1rem; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; transition: 0.3s; }
        .tab-eremby.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.1); }

        .input-eremby { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 1rem; padding: 16px; width: 100%; color: #fff; outline: none; font-size: 12px; }
        .input-eremby:focus { border-color: #2563eb; }

        .qty-controls { background: #121212; border: 1px solid #1a1a1a; border-radius: 0.8rem; display: flex; align-items: center; }
        .qty-btn { padding: 6px 12px; font-weight: bold; color: #444; transition: 0.2s; }
        .qty-btn:hover { color: #fff; }
        
        .hidden { display: none !important; }
        
        /* Scrollbar Estilo Dark */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 py-5 px-6 bg-[#050505]/95 backdrop-blur-md border-b border-zinc-900">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                    <i class="fa-solid fa-bolt text-white text-xl"></i>
                </div>
                <span class="font-black italic uppercase text-2xl tracking-tighter">Azure <span class="text-blue-500">Digital</span></span>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="navigate('cart')" class="bg-white text-black px-6 py-2.5 rounded-2xl font-black text-xs flex items-center gap-2">
                    <i class="fa-solid fa-cart-shopping"></i> Carrinho <span id="cart-badge" class="bg-black text-white px-2 py-0.5 rounded-lg text-[10px]">0</span>
                </button>
                <div id="auth-box">
                    <button class="bg-zinc-900 border border-zinc-800 px-6 py-2.5 rounded-2xl font-black uppercase italic text-xs hover:bg-zinc-800 transition">Entrar</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="view-home">
        <header class="max-w-7xl mx-auto px-6 pt-16 pb-12">
            <h1 class="text-7xl font-black italic uppercase tracking-tighter leading-none mb-4">EREMBY <span class="text-blue-600">SYSTEM</span></h1>
            <p class="text-zinc-500 text-lg max-w-sm mb-12">Entrega automática via e-mail e Discord. Qualidade garantida.</p>
            
            <div class="flex flex-wrap gap-3" id="eremby-tabs">
                <div class="tab-eremby active" onclick="filterItems('Todos')">Todos</div>
                <div class="tab-eremby" onclick="filterItems('Streaming')">Streaming</div>
                <div class="tab-eremby" onclick="filterItems('IA Tools')">IA Tools</div>
                <div class="tab-eremby" onclick="filterItems('Games')">Games</div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 pb-24">
            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <div id="view-cart" class="hidden">
        <section class="max-w-7xl mx-auto px-6 py-16">
            <div class="mb-12">
                <h2 class="text-3xl font-black italic uppercase italic">Carrinho de Compras</h2>
                <p class="text-zinc-500 text-sm">Finalize seu pedido de forma segura.</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                <div class="lg:col-span-4 eremby-card p-8">
                    <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-8 tracking-widest">Informações de Pagamento</h3>
                    <div class="space-y-5">
                        <div class="flex items-center gap-3 p-5 bg-blue-600/5 border border-blue-600/20 rounded-2xl">
                            <i class="fa-brands fa-pix text-emerald-400 text-xl"></i>
                            <span class="text-sm font-bold">Pix Automático</span>
                        </div>
                        <input type="email" placeholder="Seu melhor e-mail para entrega" class="input-eremby">
                    </div>
                </div>

                <div class="lg:col-span-5 eremby-card p-8">
                    <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-8 tracking-widest">Produtos no Carrinho</h3>
                    <div id="cart-render-list" class="space-y-4"></div>
                </div>

                <div class="lg:col-span-3 eremby-card p-8">
                    <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-8 tracking-widest">Resumo Total</h3>
                    <div class="pt-6 border-t border-zinc-900 flex justify-between items-baseline mb-10">
                        <span class="text-sm font-black italic">TOTAL</span>
                        <span id="final-total-price" class="text-3xl font-black italic text-blue-500">R$ 0,00</span>
                    </div>
                    <button class="btn-main !py-5" onclick="alert('Gerando PIX...')">Pagar Agora</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        const products = [
            { id: 1, name: "Youtube Premium 30D", price: 1.50, cat: "Streaming", img: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" },
            { id: 2, name: "Google Veo 3 Access", price: 4.99, cat: "IA Tools", img: "https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Gemini_logo.svg" },
            { id: 3, name: "ChatGPT Plus Shared", price: 2.30, cat: "IA Tools", img: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" },
            { id: 4, name: "Xbox Game Pass", price: 9.90, cat: "Games", img: "https://upload.wikimedia.org/wikipedia/commons/f/f9/Xbox_one_logo.svg" },
            { id: 5, name: "Canva Pro Life", price: 5.00, cat: "Design", img: "https://upload.wikimedia.org/wikipedia/commons/0/0e/Canva_logo_2021.svg" }
        ];

        let cart = [];

        function filterItems(cat) {
            document.querySelectorAll('.tab-eremby').forEach(t => t.classList.toggle('active', t.innerText === cat));
            const grid = document.getElementById('products-grid');
            const filtered = cat === 'Todos' ? products : products.filter(p => p.cat === cat);
            
            grid.innerHTML = filtered.map(p => `
                <div class="eremby-card p-5 flex flex-col h-full">
                    <div class="w-full h-36 bg-zinc-950 rounded-2xl mb-5 flex items-center justify-center p-6 border border-zinc-900/40">
                        <img src="${p.img}" class="max-h-full opacity-90">
                    </div>
                    <div class="text-[9px] font-black uppercase text-blue-500 mb-2 tracking-widest">${p.cat}</div>
                    <h3 class="text-xs font-bold mb-5 line-clamp-1">${p.name}</h3>
                    <div class="mt-auto">
                        <div class="text-2xl font-black italic mb-6">R$ ${p.price.toFixed(2).replace('.', ',')}</div>
                        <button onclick="addToCart(${p.id})" class="btn-main">Comprar</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = cart.find(i => i.id === id);
            if(item) item.qty++;
            else cart.push({...products.find(p => p.id === id), qty: 1});
            updateCart();
            navigate('cart');
        }

        function editQty(idx, delta) {
            cart[idx].qty += delta;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCart();
        }

        function updateCart() {
            let total = 0; let count = 0;
            const list = document.getElementById('cart-render-list');
            
            list.innerHTML = cart.map((item, i) => {
                total += (item.price * item.qty); count += item.qty;
                return `
                <div class="flex justify-between items-center p-4 bg-zinc-900/40 border border-zinc-900 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-zinc-900 rounded-xl flex items-center justify-center p-2"><img src="${item.img}" class="max-h-full"></div>
                        <div>
                            <div class="text-[10px] font-black italic uppercase">${item.name}</div>
                            <div class="text-[8px] text-zinc-500">ENTREGA AUTOMÁTICA</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="qty-controls">
                            <button onclick="editQty(${i}, -1)" class="qty-btn">-</button>
                            <span class="text-[10px] font-black px-2">${item.qty}</span>
                            <button onclick="editQty(${i}, 1)" class="qty-btn">+</button>
                        </div>
                        <button onclick="editQty(${i}, -999)" class="text-zinc-700 hover:text-red-500 transition"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('cart-badge').innerText = count;
            document.getElementById('final-total-price').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function navigate(page) {
            document.getElementById('view-home').classList.toggle('hidden', page !== 'home');
            document.getElementById('view-cart').classList.toggle('hidden', page !== 'cart');
            window.scrollTo(0,0);
        }

        window.onload = () => filterItems('Todos');
    </script>
</body>
</html>
