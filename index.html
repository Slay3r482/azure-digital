<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Store</title>
    <style>
        :root { --bg: #050505; --card-bg: rgba(13, 14, 17, 0.7); --border: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        .hero-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1;
            object-fit: cover; opacity: 0.35;
            mask-image: linear-gradient(to bottom, black 0%, transparent 85%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 85%);
        }

        /* MODAL DE LOGIN (Igual à imagem enviada) */
        #loginModal {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            align-items: center; justify-content: center;
        }
        .login-box {
            background: #0D0E11; border: 1px solid var(--border);
            width: 100%; max-width: 400px; padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .input-group {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 20px;
        }
        .input-group input { background: transparent; border: none; outline: none; color: #fff; width: 100%; font-size: 14px; }
        .input-group input::placeholder { color: #444; }
        
        .btn-entrar {
            background: #444; color: #fff; width: 100%; padding: 14px;
            border-radius: 12px; font-weight: 700; font-size: 16px;
            transition: 0.3s; text-align: center; cursor: pointer;
        }
        .btn-entrar:hover { background: #555; }

        /* Estilo dos Cards e Categorias */
        .card-mine {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px;
            padding: 18px; transition: 0.4s; backdrop-filter: blur(12px);
            width: 100%; max-width: 200px; margin: 0 auto;
        }
        .pill {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            padding: 10px 22px; border-radius: 99px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; color: #71717a; cursor: pointer;
        }
        .pill.active { background: #fff; color: #000; border-color: #fff; }
    </style>
</head>
<body>

    <img src="https://cdn.ereemby.com/attachments/17715554716225022imagem.png" class="hero-mask">

    <header class="sticky top-0 z-50 bg-[#050505]/80 backdrop-blur-xl border-b border-white/5 px-8 py-5">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://cdn.ereemby.com/attachments/17706209715176161imagem.jpeg" class="w-9 h-9 rounded-xl">
                <span class="font-black text-base italic uppercase">Azure Digital</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-white text-black px-5 py-2.5 rounded-xl font-black text-[11px] uppercase cursor-pointer">Carrinho</div>
                <button onclick="openLogin()" class="bg-[#111] px-5 py-2.5 rounded-xl text-zinc-400 font-bold text-[11px] border border-white/5">ENTRAR</button>
            </div>
        </div>
    </header>

    <div id="loginModal" onclick="closeLogin(event)">
        <div class="login-box" onclick="event.stopPropagation()">
            <div class="mb-6 text-center">
                <h2 class="text-2xl font-black italic uppercase">Acessar Conta</h2>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-envelope text-zinc-600"></i>
                <div class="flex flex-col w-full">
                    <span class="text-[10px] text-blue-500 font-bold uppercase">Endereço de e-mail</span>
                    <input type="email" placeholder="exemplo@gmail.com">
                </div>
            </div>

            <button class="btn-entrar" onclick="alert('Login realizado!')">Entrar</button>
        </div>
    </div>

    <main class="max-w-[1400px] mx-auto px-8 py-14">
        <nav class="flex justify-center gap-3 mb-12">
            <button class="pill active">Todos</button>
            <button class="pill">Discord</button>
            <button class="pill">Streaming</button>
        </nav>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <div class="card-mine">
                <div class="bg-black border border-white/5 rounded-xl aspect-square flex items-center justify-center mb-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" class="w-1/2">
                </div>
                <span class="text-[9px] text-zinc-500 font-black uppercase text-center mb-1">Youtube Premium</span>
                <p class="text-xl font-black italic text-center">R$ 1,50</p>
                <button class="bg-white text-black w-full py-2 rounded-lg font-black text-[10px] mt-4">COMPRAR</button>
            </div>
        </div>
    </main>

    <script>
        function openLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function closeLogin(e) {
            document.getElementById('loginModal').style.display = 'none';
        }
    </script>
</body>
</html>
