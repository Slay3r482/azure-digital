<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>Azure Digital</title>
    <style>
        :root { --bg: #08090B; --header: #0D0E11; --border: #201e1e; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }

        .hero-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1;
            object-fit: cover; opacity: 0.3;
            mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
        }

        /* CARD COMPACTO - Estilo Eremby */
        .card-nexus {
            background: rgba(88, 88, 105, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px; /* Reduzi o padding interno */
            transition: 0.3s;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            max-width: 260px; /* Limita a largura para não crescer demais */
            margin: 0 auto;
        }
        .card-nexus:hover { border-color: #585869; transform: translateY(-4px); }

        .img-container {
            background: #0D0E11; border-radius: 8px; width: 100%; aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
        }
        .img-container img { width: 50%; opacity: 0.9; object-fit: contain; }

        .btn-buy-nexus {
            background: #fff; color: #000; width: 100%; padding: 10px;
            border-radius: 6px; font-weight: 900; font-size: 11px;
            text-transform: uppercase; margin-top: 12px; transition: 0.2s;
        }
    </style>
</head>
<body>

    <img src="https://cdn.ereemby.com/attachments/17715554716225022imagem.png" class="hero-mask">

    <header class="sticky top-0 z-50 bg-[#0D0E11]/90 backdrop-blur-md border-b border-[#201e1e] px-6 py-4">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://cdn.ereemby.com/attachments/17706209715176161imagem.jpeg" class="w-8 h-8 rounded-lg">
                <span class="font-black text-sm uppercase italic">Azure Digital</span>
            </div>

            <div class="flex items-center gap-4">
                <div class="relative bg-white text-black px-4 py-2 rounded-md font-black text-[11px] uppercase cursor-pointer flex items-center gap-2">
                    <i class="fa-solid fa-bag-shopping"></i> Carrinho
                    <div class="absolute -top-2 -right-2 bg-white text-black border-2 border-[#0D0E11] w-5 h-5 rounded-full flex items-center justify-center text-[9px]">0</div>
                </div>
                <button class="bg-[#1a1a1a] px-4 py-2 rounded-md text-white font-bold text-[11px] uppercase border border-[#201e1e]">Entrar</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-6 py-12">
        <h1 class="text-4xl font-black italic mb-10 uppercase tracking-tighter">Produtos</h1>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
            
            <div class="card-nexus">
                <div class="img-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
                </div>
                <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest italic text-center">Youtube Premium</span>
                <p class="text-xl font-black italic mt-1 text-center">R$ 1,50</p>
                <button class="btn-buy-nexus">Comprar</button>
            </div>

            <div class="card-nexus">
                <div class="img-container">
                    <i class="fa-brands fa-discord text-4xl text-indigo-500/40"></i>
                </div>
                <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest italic text-center">Discord Nitro</span>
                <p class="text-xl font-black italic mt-1 text-center">R$ 15,90</p>
                <button class="btn-buy-nexus">Comprar</button>
            </div>

            </div>
    </main>

</body>
</html>
