<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <title>Azure Digital</title>
    <style>
        :root { --bg: #08090B; --header: #0D0E11; --border: #201e1e; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }

        /* Banner de fundo com a máscara exata do original */
        .hero-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1;
            object-fit: cover; opacity: 0.4;
            mask-image: linear-gradient(to bottom, black 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
        }

        /* Card igual ao da foto (sem botões extras) */
        .card-nexus {
            background: rgba(88, 88, 105, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: 0.3s;
            backdrop-filter: blur(8px);
        }
        .card-nexus:hover { border-color: #585869; transform: translateY(-4px); }

        .img-container {
            background: #0D0E11; border-radius: 8px; width: 100%; aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center; margin-bottom: 15px;
        }
        .img-container img { width: 60%; opacity: 0.9; }

        /* Botão de compra limpo */
        .btn-buy-nexus {
            background: #fff; color: #000; width: 100%; padding: 12px;
            border-radius: 8px; font-weight: 800; font-size: 12px;
            text-transform: uppercase; margin-top: 15px; transition: 0.2s;
        }
        .btn-buy-nexus:hover { background: #e2e2e2; }

        /* Categorias da Lateral */
        .side-item {
            background: rgba(13,14,17,0.5); border: 1px solid var(--border);
            padding: 12px 18px; border-radius: 8px; font-size: 11px; font-weight: 800;
            color: #8C8C8C; text-transform: uppercase; text-align: left; margin-bottom: 8px;
            cursor: pointer; transition: 0.2s;
        }
        .side-item.active { background: #fff; color: #000; border-color: #fff; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ffba09; border-radius: 10px; }
    </style>
</head>
<body>

    <img src="https://cdn.ereemby.com/attachments/17715554716225022imagem.png" class="hero-mask">

    <header class="sticky top-0 z-50 bg-[#0D0E11]/90 backdrop-blur-md border-b border-[#201e1e] px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://cdn.ereemby.com/attachments/17706209715176161imagem.jpeg" class="w-9 h-9 rounded-lg">
                <span class="font-black text-sm tracking-tight uppercase italic">Azure Digital</span>
            </div>

            <div class="hidden md:flex bg-[#0D0E11] border border-[#201e1e] px-4 py-2 rounded-xl w-1/3 items-center gap-3">
                <i class="fa-solid fa-magnifying-glass text-zinc-600 text-xs"></i>
                <input type="text" placeholder="Pesquisar..." class="bg-transparent outline-none text-xs w-full">
            </div>

            <div class="flex items-center gap-4">
                <div class="relative bg-white text-black px-4 py-2 rounded-md font-extrabold text-[11px] uppercase cursor-pointer">
                    <i class="fa-solid fa-cart-shopping mr-2"></i> Carrinho
                    <div class="absolute -top-2 -right-2 bg-white text-black border-2 border-[#0D0E11] w-5 h-5 rounded-full flex items-center justify-center text-[9px]">0</div>
                </div>
                <button class="text-zinc-500 text-[11px] font-bold uppercase hover:text-white transition">Entrar</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-8 py-12 flex gap-12">
        
        <aside class="w-64 hidden lg:block">
            <p class="text-[9px] font-black text-zinc-700 uppercase tracking-widest mb-6">Categorias</p>
            <button class="side-item active w-full">Todos os produtos</button>
            <button class="side-item w-full">Streaming</button>
            <button class="side-item w-full">Discord</button>
            <button class="side-item w-full">Games</button>
        </aside>

        <div class="flex-1">
            <h1 class="text-5xl font-black italic mb-10 uppercase tracking-tighter">Todos</h1>
            
            <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                
                <div class="card-nexus">
                    <div class="img-container">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
                    </div>
                    <h3 class="text-xs font-bold mb-1">YouTube Premium</h3>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase">Entrega Imediata</p>
                    <div class="mt-4">
                        <span class="text-lg font-black italic">R$ 1,50</span>
                        <button class="btn-buy-nexus">Comprar</button>
                    </div>
                </div>

                <div class="card-nexus">
                    <div class="img-container">
                        <i class="fa-brands fa-discord text-4xl text-indigo-500/40"></i>
                    </div>
                    <h3 class="text-xs font-bold mb-1">Discord Nitro (Link)</h3>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase">Ativação Rápida</p>
                    <div class="mt-4">
                        <span class="text-lg font-black italic">R$ 15,90</span>
                        <button class="btn-buy-nexus">Comprar</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
