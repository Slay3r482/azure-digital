<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Store</title>
    <style>
        body { background-color: #080808; color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Estilo idêntico ao da imagem Nexus Prime */
        .nexus-card { 
            background: #111111; 
            border: 1px solid #1a1a1a; 
            border-radius: 1.5rem; 
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.3s;
        }
        .nexus-card:hover { border-color: #333; transform: translateY(-3px); }

        /* Container da Imagem do Produto */
        .product-image {
            width: 100%;
            height: 120px;
            background-size: cover;
            background-position: center;
            border-radius: 1rem;
            margin-bottom: 12px;
            position: relative;
        }

        /* Badge de Entrega Automática (Exato igual à foto) */
        .badge-auto {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            color: #fff;
            font-size: 7px;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Título do Produto */
        .product-title {
            font-size: 11px;
            font-weight: 700;
            color: #efefef;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Preço e Ícones de Pagamento */
        .price-section { margin-bottom: 15px; }
        .price-main { font-size: 22px; font-weight: 900; font-style: italic; }
        .payment-icons { 
            font-size: 9px; 
            color: #888; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 4px;
        }

        /* Botão "VER DETALHES" (Padrão da Nexus) */
        .btn-details {
            background: #1a1a1a;
            color: #fff;
            width: 100%;
            padding: 10px;
            border-radius: 0.8rem;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-details:hover { background: #252525; }

        /* Botão "COMPRAR" (Caso o item esteja selecionado) */
        .btn-buy-now {
            background: #ffffff;
            color: #000;
            width: 100%;
            padding: 10px;
            border-radius: 0.8rem;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
            
            <div class="nexus-card">
                <div class="product-image" style="background-image: url('https://img.freepik.com/vetores-premium/logotipo-do-youtube-vermelho-e-branco-fundo-preto_960911-379.jpg');">
                    <span class="badge-auto">⚡ Entrega Automática</span>
                </div>
                <div class="product-title">
                    <span class="w-2 h-2 rounded-full bg-red-500"></span> Youtube Premium
                </div>
                <div class="price-section">
                    <div class="price-main text-white">R$ 1,50 <span class="text-sm font-normal text-zinc-500">+ 🪙</span></div>
                    <div class="payment-icons">
                        <i class="fa-brands fa-cc-mastercard text-orange-500"></i>
                        <i class="fa-brands fa-cc-visa text-blue-500"></i>
                        <span>À vista no PIX ou Cartão</span>
                    </div>
                </div>
                <button class="btn-details">Ver Detalhes</button>
            </div>

            <div class="nexus-card">
                <div class="product-image" style="background-image: url('https://static.vecteezy.com/system/resources/previews/010/353/285/original/google-logo-on-black-background-free-vector.jpg');">
                    <span class="badge-auto">⚡ Entrega Automática</span>
                </div>
                <div class="product-title">
                    <span class="w-2 h-2 rounded-full bg-purple-500"></span> Google Veo3
                </div>
                <div class="price-section">
                    <div class="price-main text-white">R$ 4,99 <span class="text-sm font-normal text-zinc-500">+ 🪙</span></div>
                    <div class="payment-icons">
                        <i class="fa-brands fa-cc-visa text-blue-500"></i>
                        <span>À vista no PIX ou Cartão</span>
                    </div>
                </div>
                <button class="btn-details">Ver Detalhes</button>
            </div>

            <div class="nexus-card">
                <div class="product-image flex items-center justify-center bg-zinc-900">
                    <span class="font-black text-xs text-zinc-500 tracking-widest">ESGOTADO</span>
                </div>
                <div class="product-title">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span> Chat Gpt
                </div>
                <div class="price-section">
                    <div class="price-main text-white">R$ 2,30 <i class="fa-solid fa-bolt text-blue-500 text-sm"></i></div>
                    <div class="payment-icons">
                        <i class="fa-brands fa-cc-mastercard text-orange-500"></i>
                        <span>À vista no PIX ou Cartão</span>
                    </div>
                </div>
                <button class="btn-details">Ver Detalhes</button>
            </div>

            <div class="nexus-card">
                <div class="product-image" style="background-image: url('https://yt3.googleusercontent.com/ytc/AIdro_miT8Rov_3pP-mS4H5Pz-4xW-kX9D7z-u-0K4O7=s900-c-k-c0x00ffffff-no-rj');">
                </div>
                <div class="product-title">
                    <span class="w-2 h-2 rounded-full bg-green-400"></span> Premiere
                </div>
                <div class="price-section">
                    <div class="price-main text-white">R$ 2,30 <i class="fa-solid fa-bolt text-blue-500 text-sm"></i></div>
                    <div class="payment-icons">
                        <i class="fa-brands fa-cc-visa text-blue-500"></i>
                        <span>À vista no PIX ou Cartão</span>
                    </div>
                </div>
                <button class="btn-buy-now">Comprar <i class="fa-solid fa-bag-shopping ml-2"></i></button>
            </div>

            <div class="nexus-card">
                <div class="product-image" style="background-image: url('https://logowik.com/content/uploads/images/capcut-icon6105.jpg');">
                </div>
                <div class="product-title">
                    <span class="w-2 h-2 rounded-full bg-purple-400"></span> CapCut PRO
                </div>
                <div class="price-section">
                    <div class="price-main text-white">R$ 2,20 <span class="text-sm font-normal text-zinc-500">+ 🪙</span></div>
                    <div class="payment-icons">
                        <span>À vista no PIX ou Cartão</span>
                    </div>
                </div>
                <button class="btn-details">Ver Detalhes</button>
            </div>

        </div>
    </main>

</body>
</html>
