<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Pagamento</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .nexus-box { background: #0d0d0d; border: 1px solid #161616; border-radius: 1rem; padding: 20px; }
        .input-dark { background: #121212; border: 1px solid #1a1a1a; border-radius: 0.8rem; padding: 12px; width: 100%; color: #fff; outline: none; }
        .btn-white { background: #fff; color: #000; padding: 14px; border-radius: 0.8rem; font-weight: 900; text-transform: uppercase; font-size: 12px; width: 100%; transition: 0.3s; }
        .btn-white:hover { background: #ccc; }
        .hidden { display: none !important; }
        
        /* Estilo do QR Code */
        .qr-container { border: 2px solid #eab308; padding: 15px; border-radius: 1.5rem; background: white; width: 220px; height: 220px; margin: 0 auto; position: relative; }
        .qr-corner { position: absolute; width: 30px; height: 30px; border: 4px solid #eab308; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-[#050505]/90 backdrop-blur-md border-b border-zinc-900">
        <div class="w-full flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <div class="w-8 h-8 bg-blue-600 rounded-lg"></div>
                <span class="font-black italic uppercase text-xl tracking-tighter">Azure <span class="text-blue-500">Digital</span></span>
            </div>
            <div id="auth-area" class="flex items-center gap-4">
                <button onclick="showView('cart')" class="bg-white text-black px-5 py-2 rounded-xl font-bold text-xs flex items-center gap-2">
                    <i class="fa-solid fa-bag-shopping"></i> Carrinho <span id="cart-count" class="bg-black text-white px-2 py-0.5 rounded-md text-[10px]">0</span>
                </button>
            </div>
        </div>
    </nav>

    <section id="cart-view" class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-9 space-y-6">
                <div class="nexus-box">
                    <h3 class="font-bold text-sm mb-6 uppercase tracking-widest text-zinc-500">Produtos no carrinho</h3>
                    <div id="cart-list" class="space-y-4"></div>
                </div>
            </div>
            <div class="lg:col-span-3">
                <div class="nexus-box">
                    <h3 class="font-bold text-sm mb-6 uppercase tracking-widest text-zinc-500">Resumo</h3>
                    <div class="flex justify-between text-xl font-black italic mb-6">
                        <span>TOTAL</span>
                        <span id="cart-total">R$ 0,00</span>
                    </div>
                    <button onclick="generatePayment()" class="btn-white">Gerar pagamento</button>
                </div>
            </div>
        </div>
    </section>

    <section id="payment-view" class="hidden max-w-4xl mx-auto px-6 py-12">
        <div class="mb-8">
            <div class="text-xs text-zinc-500 mb-1">Início > <span class="text-white">Pagamento</span></div>
            <h1 class="text-2xl font-bold">Aguardando pagamento</h1>
            <p id="payment-date" class="text-zinc-600 text-[10px] mt-1"></p>
        </div>

        <div class="nexus-box grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 text-xs">
            <div>
                <p class="text-zinc-500 mb-1 uppercase font-bold">Produtos</p>
                <p id="pay-prod-name" class="font-bold"></p>
            </div>
            <div>
                <p class="text-zinc-500 mb-1 uppercase font-bold">Total</p>
                <p id="pay-total" class="text-yellow-500 font-bold"></p>
            </div>
            <div>
                <p class="text-zinc-500 mb-1 uppercase font-bold">Email</p>
                <p id="pay-email" class="truncate font-medium"></p>
            </div>
            <div>
                <p class="text-zinc-500 mb-1 uppercase font-bold">Método</p>
                <p class="flex items-center gap-1 font-bold"><i class="fa-brands fa-pix text-[#00bdae]"></i> Pix</p>
            </div>
        </div>

        <div class="nexus-box text-center py-12">
            <p class="text-[10px] text-zinc-500 uppercase tracking-[0.2em] mb-2 font-black">Tempo restante</p>
            <div class="text-2xl font-bold mb-8">24:00:00</div>

            <div class="relative inline-block mb-10">
                <div class="qr-container">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=AZURE_PAYMENT_SAMPLE" alt="QR Code" class="w-full h-full">
                </div>
            </div>

            <div class="max-w-md mx-auto">
                <p class="text-[10px] text-zinc-500 uppercase mb-4">Ou pague com Pix copia e cola</p>
                <div class="flex items-center bg-[#121212] border border-zinc-900 rounded-xl p-3 gap-3 mb-4">
                    <i class="fa-solid fa-copy text-zinc-700"></i>
                    <input type="text" id="pix-code" readonly value="00020126850014br.gov.bcb.pix..." class="bg-transparent border-none text-[10px] w-full text-zinc-400 outline-none">
                </div>
                <button onclick="copyPix()" class="bg-white text-black px-8 py-3 rounded-xl font-black uppercase text-[10px]">Copiar Código Pix</button>
            </div>
        </div>
    </section>

    <script>
        let cart = JSON.parse(localStorage.getItem('azure_cart')) || [];
        const user = localStorage.getItem('azure_user') || "visitante@gmail.com";

        function updateUI() {
            const list = document.getElementById('cart-list');
            let total = 0;
            
            list.innerHTML = cart.map((item, idx) => {
                total += (item.price * item.quantity);
                return `
                    <div class="flex justify-between items-center p-4 bg-zinc-900/50 border border-zinc-900 rounded-xl">
                        <span class="font-bold text-xs">${item.quantity}x ${item.name}</span>
                        <span class="font-black italic">R$ ${(item.price * item.quantity).toFixed(2).replace('.', ',')}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
            document.getElementById('cart-count').innerText = cart.length;
        }

        function generatePayment() {
            if(cart.length === 0) return alert("Carrinho vazio!");
            
            // Troca de tela
            document.getElementById('cart-view').classList.add('hidden');
            document.getElementById('payment-view').classList.remove('hidden');

            // Preenche dados da tela de pagamento
            const now = new Date();
            document.getElementById('payment-date').innerText = now.toLocaleString('pt-BR');
            document.getElementById('pay-prod-name').innerText = `${cart[0].quantity}x ${cart[0].name}${cart.length > 1 ? '...' : ''}`;
            document.getElementById('pay-total').innerText = document.getElementById('cart-total').innerText;
            document.getElementById('pay-email').innerText = user;
        }

        function copyPix() {
            const copyText = document.getElementById("pix-code");
            copyText.select();
            document.execCommand("copy");
            alert("Código Pix copiado!");
        }

        function showView(view) {
            if(view === 'cart') {
                document.getElementById('payment-view').classList.add('hidden');
                document.getElementById('cart-view').classList.remove('hidden');
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
