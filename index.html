<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Store</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-nav { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid #111; width: 100%; }
        
        /* CARD ESTILO NEXUS */
        .nexus-card { 
            background: #0d0d0d; border: 1px solid #161616; border-radius: 1.5rem; 
            padding: 12px; display: flex; flex-direction: column; align-items: center; 
            text-align: center; transition: 0.3s; height: 100%;
        }
        .nexus-card:hover:not(.sold-out) { border-color: #333; transform: translateY(-5px); }
        .sold-out { opacity: 0.4; filter: grayscale(1); }

        .btn-comprar {
            background: #151515; color: #fff; width: 100%; padding: 12px; 
            border-radius: 0.8rem; font-size: 10px; font-weight: 900; 
            text-transform: uppercase; display: flex; align-items: center; 
            justify-content: center; gap: 8px; margin-top: auto;
        }
        .btn-comprar:hover { background: #fff; color: #000; }

        /* MODAL */
        .modal-content { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 2.5rem; padding: 40px; }
        .input-email { background: #121212; border: 1px solid #1a1a1a; border-radius: 1rem; padding: 18px; width: 100%; color: #fff; outline: none; }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50 py-4 px-6">
        <div class="w-full flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.4)]"></div>
                <span class="font-black italic uppercase text-xl tracking-tighter">Azure <span class="text-blue-500">Digital</span></span>
            </div>
            
            <div class="hidden lg:flex flex-1 max-w-md mx-10">
                <div class="relative w-full">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-zinc-600 text-sm"></i>
                    <input type="text" placeholder="Pesquisar produto..." class="w-full bg-[#0d0d0d] border border-zinc-900 rounded-xl py-3 pl-12 pr-4 text-xs outline-none focus:border-blue-600">
                </div>
            </div>

            <div class="flex items-center gap-4" id="nav-auth-area">
                <button class="bg-white text-black px-5 py-2.5 rounded-xl font-bold text-xs flex items-center gap-2">
                    <i class="fa-solid fa-bag-shopping"></i> Carrinho
                </button>
                <button id="btn-login-trigger" onclick="openModal()" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-2.5 rounded-xl font-black uppercase italic text-xs transition">
                    Entrar
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="mb-10 flex items-center gap-3">
            <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>
            <h2 class="text-xl font-black italic uppercase tracking-widest">Destaques</h2>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
            <div class="nexus-card">
                <div class="w-full h-28 bg-zinc-900 rounded-2xl mb-4 flex items-center justify-center">
                    <i class="fa-brands fa-youtube text-4xl text-red-600"></i>
                </div>
                <div class="text-[11px] font-bold text-zinc-400 mb-2 uppercase italic">YouTube Premium</div>
                <div class="text-2xl font-black italic mb-4">R$ 1,50</div>
                <button class="btn-comprar">Comprar <i class="fa-solid fa-bag-shopping"></i></button>
            </div>
            </div>
    </main>

    <div id="login-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="modal-content w-full max-w-md relative z-10">
            <div class="text-center mb-8">
                <h2 class="text-5xl font-black italic uppercase tracking-tighter mb-2">ENTRAR</h2>
                <p class="text-zinc-500 text-xs font-medium uppercase tracking-widest">Faça login com seu e-mail</p>
            </div>

            <div class="space-y-3 mb-8">
                <button class="w-full bg-[#0d0d0d] border border-zinc-800 py-4 rounded-2xl flex items-center justify-center gap-3 font-bold text-xs hover:bg-zinc-900 transition">
                    <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Conectar com Google
                </button>
                <button class="w-full bg-[#0d0d0d] border border-zinc-800 py-4 rounded-2xl flex items-center justify-center gap-3 font-bold text-xs hover:bg-zinc-900 transition">
                    <i class="fa-brands fa-discord text-blue-500 text-lg"></i> Conectar com Discord
                </button>
            </div>

            <div class="flex items-center gap-4 mb-8 text-zinc-800">
                <div class="h-[1px] bg-zinc-900 flex-1"></div>
                <span class="text-[9px] font-black uppercase tracking-widest">OU CONTINUAR COM</span>
                <div class="h-[1px] bg-zinc-900 flex-1"></div>
            </div>

            <div class="relative mb-6">
                <i class="fa-regular fa-envelope absolute left-5 top-5 text-zinc-600"></i>
                <input type="email" id="user-email" placeholder="exemplo@gmail.com" class="input-email pl-14 text-sm font-bold">
            </div>

            <button onclick="handleLogin()" class="w-full bg-zinc-800 py-5 rounded-2xl font-black italic uppercase text-zinc-500 hover:bg-white hover:text-black transition tracking-widest">
                ENTRAR
            </button>
        </div>
    </div>

    <script>
        // FUNÇÕES PARA O MODAL E PERSISTÊNCIA (SALVAR CONTA)
        const modal = document.getElementById('login-modal');
        const authArea = document.getElementById('nav-auth-area');

        function openModal() { modal.classList.remove('hidden'); }
        function closeModal() { modal.classList.add('hidden'); }

        // Salvar e Carregar Login
        function handleLogin() {
            const email = document.getElementById('user-email').value;
            if (email) {
                const username = email.split('@')[0].toUpperCase();
                localStorage.setItem('azure_user', username); // Salva no navegador
                renderUser(username);
                closeModal();
            }
        }

        function renderUser(name) {
            authArea.innerHTML = `
                <button class="bg-white text-black px-5 py-2.5 rounded-xl font-bold text-xs flex items-center gap-2">
                    <i class="fa-solid fa-bag-shopping"></i> Carrinho
                </button>
                <div class="flex items-center gap-2">
                    <span class="bg-zinc-900 border border-zinc-800 px-4 py-2.5 rounded-xl font-black uppercase italic text-[10px] tracking-tighter">
                        ${name}
                    </span>
                    <button onclick="logout()" class="text-zinc-600 hover:text-red-500 transition ml-1">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('azure_user');
            window.location.reload();
        }

        // Verifica se já estava logado ao abrir o site
        window.onload = () => {
            const savedUser = localStorage.getItem('azure_user');
            if (savedUser) renderUser(savedUser);
        };
    </script>
</body>
</html>
