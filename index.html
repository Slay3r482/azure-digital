<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Store</title>
    <style>
        :root { --bg: #050505; --card-bg: rgba(13, 14, 17, 0.7); --border: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        .hero-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1;
            object-fit: cover; opacity: 0.35;
            mask-image: linear-gradient(to bottom, black 0%, transparent 85%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 85%);
        }

        .glass { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        
        /* Card Estilo MineGine */
        .card-mine {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px;
            padding: 18px; transition: 0.4s; backdrop-filter: blur(12px);
            width: 100%; max-width: 195px; margin: 0 auto;
            display: flex; flex-direction: column;
        }
        .card-mine.hidden { display: none !important; }

        .pill {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            padding: 10px 22px; border-radius: 99px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; color: #71717a; transition: 0.3s; cursor: pointer;
        }
        .pill.active { background: #fff; color: #000; border-color: #fff; }

        #cartSide {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100%;
            background: #0D0E11; border-left: 1px solid var(--border);
            z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px;
        }
        #cartSide.active { right: 0; }

        .btn-mine { background: #fff; color: #000; width: 100%; padding: 12px; border-radius: 10px; font-weight: 900; font-size: 11px; text-transform: uppercase; margin-top: 14px; }
    </style>
</head>
<body>

    <img src="https://cdn.ereemby.com/attachments/17715554716225022imagem.png" class="hero-mask">

    <header class="sticky top-0 z-50 glass px-8 py-5">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center gap-6">
            <div class="flex items-center gap-3">
                <img src="https://cdn.ereemby.com/attachments/17706209715176161imagem.jpeg" class="w-9 h-9 rounded-xl">
                <span class="font-black text-base italic uppercase tracking-tighter">Azure <span class="text-blue-500">Digital</span></span>
            </div>

            <div class="hidden md:flex flex-1 justify-center">
                <div class="bg-white/5 border border-white/5 rounded-xl px-4 py-2 w-full max-w-md flex items-center gap-3">
                    <i class="fa-solid fa-magnifying-glass text-zinc-600"></i>
                    <input type="text" id="searchInput" oninput="filterAll()" placeholder="Pesquisar produto..." class="bg-transparent outline-none text-xs w-full text-white">
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div onclick="toggleCart()" class="bg-white text-black px-5 py-2.5 rounded-xl font-black text-[11px] uppercase cursor-pointer">
                    Carrinho (<span id="cartCount">0</span>)
                </div>
            </div>
        </div>
    </header>

    <div id="cartSide">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black italic text-xl uppercase">Meu Carrinho</h2>
            <i onclick="toggleCart()" class="fa-solid fa-xmark cursor-pointer"></i>
        </div>
        <div id="cartItems"></div>
        <div class="absolute bottom-10 left-0 w-full px-8">
            <button class="btn-mine">Finalizar Compra</button>
        </div>
    </div>

    <main class="max-w-[1400px] mx-auto px-8 py-14">
        <nav class="flex justify-center gap-3 mb-12">
            <button class="pill active" onclick="setCategory('todos', this)">Todos</button>
            <button class="pill" onclick="setCategory('discord', this)">Discord</button>
            <button class="pill" onclick="setCategory('streaming', this)">Streaming</button>
            <button class="pill" onclick="setCategory('games', this)">Games</button>
        </nav>

        <div id="productGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            
            <div class="card-mine product-card" data-category="discord" data-name="discord nitro">
                <div class="bg-black border border-white/5 rounded-xl aspect-square flex items-center justify-center mb-4 text-blue-500/30">
                    <i class="fa-brands fa-discord text-5xl"></i>
                </div>
                <span class="text-[10px] text-zinc-500 font-black uppercase text-center mb-1">Discord Nitro</span>
                <p class="text-xl font-black italic text-center">R$ 15,90</p>
                <button onclick="addToCart('Discord Nitro', 15.90)" class="btn-mine">Adicionar</button>
            </div>

            <div class="card-mine product-card" data-category="streaming" data-name="youtube premium">
                <div class="bg-black border border-white/5 rounded-xl aspect-square flex items-center justify-center mb-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" class="w-1/2">
                </div>
                <span class="text-[10px] text-zinc-500 font-black uppercase text-center mb-1">Youtube Premium</span>
                <p class="text-xl font-black italic text-center">R$ 1,50</p>
                <button onclick="addToCart('Youtube Premium', 1.50)" class="btn-mine">Adicionar</button>
            </div>

            <div class="card-mine product-card" data-category="games" data-name="gta v">
                <div class="bg-black border border-white/5 rounded-xl aspect-square flex items-center justify-center mb-4 text-zinc-700">
                    <i class="fa-solid fa-gamepad text-5xl"></i>
                </div>
                <span class="text-[10px] text-zinc-500 font-black uppercase text-center mb-1">GTA V Premium</span>
                <p class="text-xl font-black italic text-center">R$ 45,00</p>
                <button onclick="addToCart('GTA V', 45.00)" class="btn-mine">Adicionar</button>
            </div>

        </div>
    </main>

    <script>
        let currentCategory = 'todos';

        // FUNÇÃO DE FILTRAGEM (CATEGORIA + PESQUISA)
        function filterAll() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');

            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                const category = card.getAttribute('data-category');

                const matchesSearch = name.includes(searchTerm);
                const matchesCategory = (currentCategory === 'todos' || category === currentCategory);

                if (matchesSearch && matchesCategory) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        function setCategory(cat, el) {
            // Atualiza botões
            document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            
            currentCategory = cat;
            filterAll();
        }

        // FUNÇÕES DO CARRINHO
        let cart = [];
        function toggleCart() { document.getElementById('cartSide').classList.toggle('active'); }
        
        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cartCount').innerText = cart.length;
            updateCartUI();
            toggleCart();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            container.innerHTML = cart.map(i => `<div class="flex justify-between mb-2 text-xs uppercase font-bold"><span>${i.name}</span><span>R$ ${i.price.toFixed(2)}</span></div>`).join('');
        }
    </script>
</body>
</html>
