<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Store</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #1a1a1a; }
        
        /* Ajuste para o botão de usuário logado */
        #btn-user-status.logged-in {
            background: #2a2a2a;
            border: 1px solid #3b82f6;
            color: #fff;
            padding-right: 15px;
            padding-left: 15px;
        }

        .modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50 py-4 px-6">
        <div class="w-full flex justify-between items-center">
            
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg shadow-lg shadow-blue-900/50"></div>
                <span class="font-bold text-xl italic tracking-tighter uppercase">Azure Digital</span>
            </div>
            
            <div class="hidden lg:flex flex-1 max-w-md mx-10 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-zinc-500 text-sm"></i>
                <input type="text" placeholder="Pesquisar produto..." class="w-full bg-[#121212] border border-zinc-800 rounded-xl py-2 pl-10 pr-4 focus:outline-none focus:border-blue-500 transition text-xs">
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleModal('cart-modal')" class="bg-white text-black px-5 py-2 rounded-xl font-bold flex items-center gap-2 transition hover:bg-zinc-200 text-sm">
                    <i class="fa-solid fa-bag-shopping"></i> 
                    <span>Carrinho</span>
                    <span id="cart-count" class="bg-blue-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center hidden border border-white">0</span>
                </button>
                
                <div id="user-area" class="flex items-center gap-2">
                    <button onclick="toggleModal('login-modal')" id="btn-user-status" class="bg-zinc-800 text-white px-5 py-2 rounded-xl font-black uppercase italic tracking-tighter hover:bg-zinc-700 transition text-sm">
                        Entrar
                    </button>
                    <button onclick="logout()" id="btn-logout" class="hidden text-zinc-500 hover:text-red-500 transition px-2 text-xl" title="Sair da conta">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div id="login-modal" class="modal fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="toggleModal('login-modal')"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-xs p-8 bg-[#0d0d0d] border border-zinc-800 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black italic uppercase mb-1 tracking-tighter">Entrar</h2>
                <p class="text-zinc-500 text-[10px] font-medium uppercase">Apenas seu e-mail para continuar</p>
            </div>

            <div class="bg-[#121212] border border-zinc-800 rounded-2xl p-4 flex items-center gap-3 mb-6 focus-within:border-blue-500 transition">
                <i class="fa-regular fa-envelope text-zinc-600"></i>
                <input id="login-email" type="email" placeholder="exemplo@gmail.com" class="bg-transparent w-full outline-none text-xs font-bold text-white uppercase">
            </div>

            <button onclick="fazerLogin()" class="w-full bg-[#2a2a2a] py-4 rounded-2xl font-black text-zinc-400 hover:bg-white hover:text-black transition uppercase italic tracking-widest text-sm shadow-xl">
                Entrar
            </button>
        </div>
    </div>

    <script>
        let usuario = null;

        // Verifica se há login salvo ao iniciar
        window.onload = () => {
            const emailSalvo = localStorage.getItem('userEmail');
            if (emailSalvo) aplicarLogin(emailSalvo);
        };

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function fazerLogin() {
            const email = document.getElementById('login-email').value;
            if(!email.includes('@')) return alert("Por favor, insira um e-mail válido.");

            localStorage.setItem('userEmail', email); // Salva o login no navegador
            aplicarLogin(email);
            toggleModal('login-modal');
        }

        function aplicarLogin(email) {
            usuario = email;
            const btn = document.getElementById('btn-user-status');
            const logoutIcon = document.getElementById('btn-logout');
            
            // Pega o nome e coloca no botão
            const nome = email.split('@')[0].toUpperCase();
            btn.innerText = nome;
            btn.classList.add('logged-in');
            
            // Mostra o ícone de sair ao lado
            logoutIcon.classList.remove('hidden');
        }

        function logout() {
            if(confirm("Deseja sair da conta?")) {
                localStorage.removeItem('userEmail');
                location.reload();
            }
        }
    </script>
</body>
</html>
