<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Azure Digital | Store</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #1a1a1a; }
        /* Estilo do Modal Lateral */
        #cart-modal { transition: opacity 0.3s ease; }
        .cart-content { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg"></div>
                <span class="font-bold text-xl italic">AZURE DIGITAL</span>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="btn-abrir-carrinho" class="bg-white text-black px-4 py-2 rounded-lg font-bold flex items-center gap-2 relative transition hover:bg-zinc-200">
                    <i class="fa-solid fa-bag-shopping"></i> 
                    Carrinho
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-blue-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center hidden border-2 border-[#050505]">0</span>
                </button>
                <button class="bg-zinc-800 px-4 py-2 rounded-lg font-medium">Entrar</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-10 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-[#0d0d0d] border border-zinc-800 p-5 rounded-2xl">
            <h3 class="font-bold text-lg mb-2">YouTube Premium</h3>
            <p class="text-blue-500 font-black mb-4 text-2xl">R$ 1,50</p>
            <button onclick="adicionarAoCarrinho('YouTube Premium', 1.50)" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500 transition">
                COMPRAR
            </button>
        </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" id="cart-overlay"></div>
        
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-[#0d0d0d] border-l border-zinc-800 p-8 flex flex-col shadow-2xl cart-content">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold uppercase tracking-tighter">Meu Carrinho</h2>
                <button id="btn-fechar-carrinho" class="text-zinc-500 hover:text-white transition">
                    <i class="fa-solid fa-xmark text-3xl"></i>
                </button>
            </div>

            <div id="cart-items-list" class="flex-1 overflow-y-auto space-y-4">
                <p class="text-zinc-500 text-center mt-10 italic">O carrinho está vazio.</p>
            </div>

            <div class="border-t border-zinc-800 pt-6 mt-6">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span>Total:</span>
                    <span id="cart-total-price" class="text-blue-500">R$ 0,00</span>
                </div>
                <button onclick="alert('Iniciando Checkout PIX...')" class="w-full bg-blue-600 py-4 rounded-xl font-black text-lg transition">
                    PAGAR COM PIX
                </button>
            </div>
        </div>
    </div>

    <script>
        // Seleção de Elementos
        const modal = document.getElementById('cart-modal');
        const btnAbrir = document.getElementById('btn-abrir-carrinho');
        const btnFechar = document.getElementById('btn-fechar-carrinho');
        const overlay = document.getElementById('cart-overlay');
        const countBadge = document.getElementById('cart-count');
        const listaItens = document.getElementById('cart-items-list');
        const totalDisplay = document.getElementById('cart-total-price');

        let carrinho = [];

        // --- FUNÇÕES DE ABRIR/FECHAR ---
        function abrirCarrinho() {
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Trava o scroll do site
        }

        function fecharCarrinho() {
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto'; // Libera o scroll
        }

        // Eventos de Clique
        btnAbrir.addEventListener('click', abrirCarrinho);
        btnFechar.addEventListener('click', fecharCarrinho);
        overlay.addEventListener('click', fecharCarrinho);

        // --- LÓGICA DO CARRINHO ---
        function adicionarAoCarrinho(nome, preco) {
            carrinho.push({ nome, preco });
            renderizarCarrinho();
            abrirCarrinho(); // Abre o carrinho automaticamente ao clicar em comprar
        }

        function renderizarCarrinho() {
            // Atualiza contador da Navbar
            countBadge.innerText = carrinho.length;
            countBadge.classList.toggle('hidden', carrinho.length === 0);

            if (carrinho.length === 0) {
                listaItens.innerHTML = '<p class="text-zinc-500 text-center mt-10 italic">O carrinho está vazio.</p>';
                totalDisplay.innerText = "R$ 0,00";
                return;
            }

            // Gera a lista
            listaItens.innerHTML = carrinho.map((item, index) => `
                <div class="bg-[#121212] p-4 rounded-xl border border-zinc-800 flex justify-between items-center group">
                    <div>
                        <p class="font-bold text-sm uppercase">${item.nome}</p>
                        <p class="text-blue-500 text-sm font-black">R$ ${item.preco.toFixed(2)}</p>
                    </div>
                    <button onclick="removerItem(${index})" class="text-zinc-600 hover:text-red-500 transition">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `).join('');

            // Soma Total
            const total = carrinho.reduce((acc, item) => acc + item.preco, 0);
            totalDisplay.innerText = `R$ ${total.toFixed(2)}`;
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            renderizarCarrinho();
        }
    </script>
</body>
</html>
