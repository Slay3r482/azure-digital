<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Premium Store</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Containers e Cards */
        .nexus-box { background: #0d0d0d; border: 1px solid #161616; border-radius: 1.2rem; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: #2563eb; box-shadow: 0 10px 30px -10px rgba(37, 99, 235, 0.2); }
        
        /* Botões Estilizados */
        .btn-white { background: #fff; color: #000; padding: 12px; border-radius: 0.8rem; font-weight: 900; text-transform: uppercase; font-size: 11px; width: 100%; transition: 0.2s; cursor: pointer; text-align: center; border: none; }
        .btn-white:hover { background: #e5e5e5; }
        
        /* Abas de Categorias */
        .category-tab { background: #0d0d0d; border: 1px solid #161616; padding: 12px 24px; border-radius: 1rem; font-size: 11px; font-weight: 900; text-transform: uppercase; transition: 0.3s; cursor: pointer; color: #666; }
        .category-tab.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.1); }

        /* Checkout e Carrinho */
        .qty-box { background: #121212; border: 1px solid #1a1a1a; border-radius: 0.6rem; display: flex; align-items: center; }
        .qty-btn { padding: 4px 10px; font-weight: bold; color: #555; transition: 0.2s; }
        .qty-btn:hover { color: #fff; }
        .input-dark { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 0.8rem; padding: 12px; width: 100%; color: #fff; outline: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 py-4 px-6 bg-[#050505]/90 backdrop-blur-xl border-b border-zinc-900">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showView('home')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                    <i class="fa-solid fa-bolt text-white text-xl"></i>
                </div>
                <span class="font-black italic uppercase text-2xl tracking-tighter">Azure <span class="text-blue-500">Digital</span></span>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="showView('cart')" class="bg-white text-black px-6 py-2.5 rounded-2xl font-black text-xs flex items-center gap-2 hover:scale-105 transition">
                    <i class="fa-solid fa-cart-shopping"></i> Carrinho <span id="cart-badge" class="bg-black text-white px-2 py-0.5 rounded-lg text-[10px]">0</span>
                </button>
                <div id="auth-section">
                    <button onclick="openModal()" class="bg-zinc-900 border border-zinc-800 px-6 py-2.5 rounded-2xl font-black uppercase italic text-xs hover:bg-zinc-800 transition">Entrar</button>
                </div>
            </div>
        </div>
    </nav>

    <header id="home-header" class="max-w-7xl mx-auto px-6 pt-16 pb-8">
        <div class="mb-12">
            <h1 class="text-6xl md:text-7xl font-black italic uppercase tracking-tighter leading-none mb-4">A SUA LOJA<br><span class="text-blue-600">PREMIUM DIGITAL</span></h1>
            <p class="text-zinc-500 text-lg max-w-xl">Produtos com entrega 100% automática via Discord e E-mail.</p>
        </div>
        
        <div class="flex flex-wrap gap-3 mb-12" id="category-list">
            <div class="category-tab active" onclick="filterCategory('Todos')">Todos</div>
            <div class="category-tab" onclick="filterCategory('Streaming')">Streaming</div>
            <div class="category-tab" onclick="filterCategory('IA Tools')">IA Tools</div>
            <div class="category-tab" onclick="filterCategory('Games')">Games</div>
        </div>
    </header>

    <main id="home-view" class="max-w-7xl mx-auto px-6 pb-24">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
    </main>

    <section id="cart-view" class="hidden max-w-7xl mx-auto px-6 py-16">
        <div class="mb-12">
            <h2 class="text-3xl font-black italic uppercase italic">Carrinhos de compras</h2>
            <p class="text-zinc-500 text-sm">Gerencie seus itens e finalize o pagamento.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-4 nexus-box p-8">
                <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-6 tracking-widest">Informações de pagamento</h3>
                <div class="space-y-5">
                    <div class="flex items-center gap-3 p-4 bg-blue-600/5 border border-blue-600/20 rounded-xl">
                        <input type="radio" checked class="accent-blue-600">
                        <i class="fa-brands fa-pix text-emerald-400"></i>
                        <span class="text-sm font-bold">Pagar com Pix</span>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase">Seu e-mail para entrega</label>
                        <input type="email" placeholder="contato@exemplo.com" class="input-dark">
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 nexus-box p-8">
                <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-6 tracking-widest">Itens selecionados</h3>
                <div id="checkout-list" class="space-y-4"></div>
            </div>

            <div class="lg:col-span-3 nexus-box p-8">
                <h3 class="text-[10px] font-black uppercase text-zinc-600 mb-6 tracking-widest">Resumo</h3>
                <div class="pt-4 border-t border-zinc-900 flex justify-between items-baseline mb-8">
                    <span class="text-sm font-black italic">TOTAL</span>
                    <span id="final-total" class="text-3xl font-black italic text-blue-500">R$ 0,00</span>
                </div>
                <button class="btn-white !py-5 !text-sm" onclick="alert('Iniciando Checkout...')">Gerar Pagamento</button>
            </div>
        </div>
    </section>

    <script>
        const products = [
            { id: 1, name: "Youtube Premium - 30 Dias", price: 1.50, img: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png", category: "Streaming" },
            { id: 2, name: "Google Veo 3 - Acesso", price: 4.99, img: "https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Gemini_logo.svg", category: "IA Tools" },
            { id: 3, name: "ChatGPT Plus Shared", price: 2.30, img: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg", category: "IA Tools" },
            { id: 4, name: "Xbox Game Pass Ult.", price: 9.90, img: "https://upload.wikimedia.org/wikipedia/commons/f/f9/Xbox_one_logo.svg", category: "Games" },
            { id: 5, name: "Canva Pro Vitalício", price: 5.00, img: "https://upload.wikimedia.org/wikipedia/commons/0/0e/Canva_logo_2021.svg", category: "Streaming" }
        ];

        let cart = [];

        function renderProducts(cat = 'Todos') {
            const grid = document.getElementById('product-grid');
            const filtered = cat === 'Todos' ? products : products.filter(p => p.category === cat);
            
            grid.innerHTML = filtered.map(p => `
                <div class="nexus-box product-card p-5 flex flex-col h-full">
                    <div class="w-full h-36 bg-zinc-950 rounded-2xl mb-5 flex items-center justify-center p-6 border border-zinc-900/50">
                        <img src="${p.img}" class="max-h-full object-contain">
                    </div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                        <span class="text-[9px] font-black uppercase text-zinc-500 tracking-widest">${p.category}</span>
                    </div>
                    <h3 class="text-xs font-bold mb-4 line-clamp-1">${p.name}</h3>
                    <div class="mt-auto">
                        <div class="flex items-baseline gap-1 mb-5">
                            <span class="text-[10px] font-bold text-zinc-600">R$</span>
                            <span class="text-2xl font-black italic">${p.price.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <button onclick="addToCart(${p.id})" class="btn-white">Comprar Agora</button>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.innerText === cat);
            });
            renderProducts(cat);
        }

        function addToCart(id) {
            const item = cart.find(i => i.id === id);
            if(item) item.qty++;
            else cart.push({...products.find(p => p.id === id), qty: 1});
            updateUI();
            showView('cart');
        }

        function changeQty(idx, delta) {
            cart[idx].qty += delta;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateUI();
        }

        function updateUI() {
            let total = 0; let count = 0;
            const list = document.getElementById('checkout-list');
            
            list.innerHTML = cart.map((item, i) => {
                total += (item.price * item.qty); count += item.qty;
                return `
                <div class="flex justify-between items-center p-4 bg-zinc-900/50 border border-zinc-900 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-zinc-900 rounded-lg flex items-center justify-center p-2"><img src="${item.img}" class="max-h-full"></div>
                        <div>
                            <div class="text-[10px] font-black italic">${item.name}</div>
                            <div class="text-[8px] text-blue-500 uppercase font-bold">Entrega Automática</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="qty-box">
                            <button onclick="changeQty(${i}, -1)" class="qty-btn">-</button>
                            <span class="text-xs font-black px-2">${item.qty}</span>
                            <button onclick="changeQty(${i}, 1)" class="qty-btn">+</button>
                        </div>
                        <button onclick="changeQty(${i}, -999)" class="text-zinc-700 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('cart-badge').innerText = count;
            document.getElementById('final-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function showView(v) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('home-header').classList.add('hidden');
            document.getElementById('cart-view').classList.add('hidden');
            if(v === 'home') {
                document.getElementById('home-view').classList.remove('hidden');
                document.getElementById('home-header').classList.remove('hidden');
            } else { document.getElementById('cart-view').classList.remove('hidden'); }
        }

        window.onload = () => renderProducts();
    </script>
</body>
</html>
