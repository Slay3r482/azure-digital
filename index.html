<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <title>Azure Digital</title>
    <style>
        :root { --bg: #08090B; --header: #0D0E11; --border: #201e1e; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }

        /* Banner de fundo */
        .hero-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1;
            object-fit: cover; opacity: 0.4;
            mask-image: linear-gradient(to bottom, black 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
        }

        /* Card Estilo Nexus/Eremby */
        .card-nexus {
            background: rgba(88, 88, 105, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: 0.3s;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card-nexus:hover { border-color: #585869; transform: translateY(-4px); }

        .img-container {
            background: #0D0E11; border-radius: 10px; width: 100%; aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
        }
        .img-container img { width: 55%; opacity: 0.9; object-fit: contain; }

        /* Botão de compra */
        .btn-buy-nexus {
            background: #fff; color: #000; width: 100%; padding: 14px;
            border-radius: 8px; font-weight: 900; font-size: 13px;
            text-transform: uppercase; margin-top: 15px; transition: 0.2s;
        }
        .btn-buy-nexus:hover { background: #e2e2e2; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ffba09; border-radius: 10px; }
    </style>
</head>
<body>

    <img src="https://cdn.ereemby.com/attachments/17715554716225022imagem.png" class="hero-mask">

    <header class="sticky top-0 z-50 bg-[#0D0E11]/90 backdrop-blur-md border-b border-[#201e1e] px-8 py-5">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://cdn.ereemby.com/attachments/17706209715176161imagem.jpeg" class="w-10 h-10 rounded-lg">
                <span class="font-black text-base tracking-tight uppercase italic">Azure Digital</span>
            </div>

            <div class="hidden md:flex bg-[#0D0E11] border border-[#201e1e] px-5 py-2.5 rounded-xl w-[450px] items-center gap-4">
                <i class="fa-solid fa-magnifying-glass text-zinc-600 text-sm"></i>
                <input type="text" placeholder="O que você está procurando?" class="bg-transparent outline-none text-xs w-full">
            </div>

            <div class="flex items-center gap-5">
                <div class="relative bg-white text-black px-5 py-2.5 rounded-lg font-black text-[12px] uppercase cursor-pointer flex items-center gap-2">
                    <i class="fa-solid fa-bag-shopping"></i> Carrinho
                    <div class="absolute -top-2 -right-2 bg-white text-black border-2 border-[#0D0E11] w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold">0</div>
                </div>
                <button class="bg-[#1a1a1a] px-5 py-2.5 rounded-lg text-white font-bold text-[12px] uppercase border border-[#201e1e]">Entrar</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-8 py-16">
        <h1 class="text-6xl font-black italic mb-16 uppercase tracking-tighter text-center lg:text-left">Todos os Produtos</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            
            <div class="card-nexus">
                <div class="img-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
                </div>
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-2 h-2 rounded-full bg-red-600"></div>
                    <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest italic">Youtube Premium</span>
                </div>
                <p class="text-3xl font-black italic mt-2">R$ 1,50</p>
                <button class="btn-buy-nexus">Comprar Agora</button>
            </div>

            <div class="card-nexus">
                <div class="img-container">
                    <i class="fa-brands fa-discord text-6xl text-indigo-500/40"></i>
                </div>
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-2 h-2 rounded-full bg-indigo-500"></div>
                    <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest italic">Discord Nitro</span>
                </div>
                <p class="text-3xl font-black italic mt-2">R$ 15,90</p>
                <button class="btn-buy-nexus">Comprar Agora</button>
            </div>

            <div class="card-nexus">
                <div class="img-container">
                    <i class="fa-solid fa-gamepad text-6xl text-blue-500/30"></i>
                </div>
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                    <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest italic">GTA V Premium</span>
                </div>
                <p class="text-3xl font-black italic mt-2">R$ 45,00</p>
                <button class="btn-buy-nexus">Comprar Agora</button>
            </div>

        </div>
    </main>

</body>
</html>
