<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <title>Azure Digital | Eremby System</title>
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --border: #1a1a1a; --accent: #2563eb; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Estilo Eremby Cards */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 1.25rem; transition: 0.2s; }
        .card:hover { border-color: var(--accent); }
        
        /* Botões */
        .btn-buy { background: #fff; color: #000; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; padding: 12px; border-radius: 0.75rem; width: 100%; transition: 0.2s; }
        .btn-buy:hover { opacity: 0.8; transform: scale(1.02); }
        
        /* Abas de Categorias */
        .tab { padding: 10px 20px; border-radius: 0.75rem; background: var(--card); border: 1px solid var(--border); color: #666; font-weight: 800; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .tab.active { background: #fff; color: #000; border-color: #fff; }

        /* Controles de Quantidade no Carrinho */
        .qty-ctrl { display: flex; align-items: center; background: #151515; border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; }
        .qty-btn { padding: 5px 12px; color: #fff; font-weight: bold; transition: 0.2s; cursor: pointer; border: none; background: transparent; }
        .qty-btn:hover { background: #202020; }
        .qty-num { width: 30px; text-align: center; font-size: 0.8rem; font-weight: 800; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

        .input-eremby { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 15px; width: 100%; color: #fff; font-size: 0.8rem; outline: none; }
        .input-eremby:focus { border-color: var(--accent); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-[#050505]/80 backdrop-blur-md border-b border-[#111] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showView('home')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
                    <i class="fa-solid fa-bolt text-white"></i>
                </div>
                <span class="text-2xl font-black italic uppercase tracking-tighter italic">Azure <span class="text-blue-600">Digital</span></span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showView('cart')" class="bg-white text-black px-5 py-2 rounded-xl font-black text-[0.7rem] uppercase flex items-center gap-2">
                    <i class="fa-solid fa-cart-shopping"></i> Carrinho (<span id="cart-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <div id="view-home">
        <div class="max-w-7xl mx-auto px-6 py-12">
            <h1 class="text-6xl font-black italic uppercase tracking-tighter mb-2">EREMBY <span class="text-blue-600">STORE</span></h1>
            <p class="text-zinc-500 text-sm mb-10">Entrega automática e imediata via e-mail.</p>
            
            <div class="flex flex-wrap gap-3 mb-12">
                <button class="tab active" onclick="filter('Todos', this)">Todos</button>
                <button class="tab" onclick="filter('Streaming', this)">Streaming</button>
                <button class="tab" onclick="filter('IA Tools', this)">IA Tools</button>
                <button class="tab" onclick="filter('Games', this)">Games</button>
            </div>

            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                </div>
        </div>
    </div>

    <div id="view-cart" class="hidden">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <div class="mb-10">
                <h2 class="text-3xl font-black uppercase italic italic">Finalizar Pedido</h2>
                <p class="text-zinc-500 text-xs uppercase font-bold tracking-widest">Passo Final</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 space-y-6">
                    <div class="card p-8">
                        <p class="text-[0.6rem] font-black text-zinc-500 uppercase tracking-widest mb-6">Método de Pagamento</p>
                        <div class="flex items-center gap-4 p-4 bg-blue-600/5 border border-blue-600/20 rounded-xl mb-6">
                            <i class="fa-brands fa-pix text-emerald-400 text-xl"></i>
                            <span class="text-sm font-bold uppercase">Pagar com Pix</span>
                        </div>
                        <p class="text-[0.6rem] font-black text-zinc-500 uppercase tracking-widest mb-2">Seu E-mail</p>
                        <input type="email" placeholder="onde quer receber o produto?" class="input-eremby">
                    </div>
                </div>

                <div class="lg:col-span-5 card p-8">
                    <p class="text-[0.6rem] font-black text-zinc-500 uppercase tracking-widest mb-6">Itens no Carrinho</p>
                    <div id="cart-items-list" class="space-y-4">
                        </div>
                </div>

                <div class="lg:col-span-3 card p-8 h-fit">
                    <p class="text-[0.6rem] font-black text-zinc-500 uppercase tracking-widest mb-6">Resumo</p>
                    <div class="flex justify-between items-baseline pt-4 border-t border-[#111] mb-8">
                        <span class="text-xs font-bold text-zinc-400">TOTAL:</span>
                        <span id="total-price" class="text-3xl font-black italic text-blue-600">R$ 0,00</span>
                    </div>
                    <button class="btn-buy" onclick="alert('Gerando código Pix...')">Concluir Compra</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Youtube Premium 30 Dias", price: 1.50, cat: "Streaming", img: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" },
            { id: 2, name: "Google Gemini Advanced", price: 4.90, cat: "IA Tools", img: "https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Gemini_logo.svg" },
            { id: 3, name: "ChatGPT Plus Compartilhado", price: 2.30, cat: "IA Tools", img: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" },
            { id: 4, name: "Xbox Game Pass 1 Mês", price: 9.90, cat: "Games", img: "https://upload.wikimedia.org/wikipedia/commons/f/f9/Xbox_one_logo.svg" }
        ];

        let cart = [];

        function filter(cat, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            
            const grid = document.getElementById('product-grid');
            const data = cat === 'Todos' ? products : products.filter(p => p.cat === cat);
            
            grid.innerHTML = data.map(p => `
                <div class="card p-6 flex flex-col h-full">
                    <div class="bg-[#050505] rounded-2xl p-6 h-32 flex items-center justify-center mb-5 border border-[#111]">
                        <img src="${p.img}" class="max-h-full">
                    </div>
                    <span class="text-[0.6rem] font-black text-blue-500 uppercase mb-1">${p.cat}</span>
                    <h3 class="text-[0.8rem] font-bold mb-4 line-clamp-1">${p.name}</h3>
                    <div class="mt-auto">
                        <p class="text-2xl font-black italic mb-4">R$ ${p.price.toFixed(2).replace('.', ',')}</p>
                        <button onclick="addToCart(${p.id})" class="btn-buy">Adicionar</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.qty++;
            } else {
                const p = products.find(x => x.id === id);
                cart.push({...p, qty: 1});
            }
            updateCart();
            showView('cart');
        }

        function updateQty(index, delta) {
            cart[index].qty += delta;
            if(cart[index].qty <= 0) cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            let total = 0;
            let count = 0;
            const list = document.getElementById('cart-items-list');
            
            list.innerHTML = cart.map((item, i) => {
                total += (item.price * item.qty);
                count += item.qty;
                return `
                <div class="flex justify-between items-center p-4 bg-[#080808] border border-[#151515] rounded-xl">
                    <div class="flex items-center gap-3">
                        <img src="${item.img}" class="w-8 h-8 object-contain">
                        <div>
                            <p class="text-[0.7rem] font-black uppercase">${item.name}</p>
                            <p class="text-[0.6rem] text-zinc-500">R$ ${item.price.toFixed(2)}/un</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="qty-ctrl">
                            <button class="qty-btn" onclick="updateQty(${i}, -1)">-</button>
                            <span class="qty-num">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${i}, 1)">+</button>
                        </div>
                        <button onclick="updateQty(${i}, -999)" class="text-zinc-600 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('cart-count').innerText = count;
            document.getElementById('total-price').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function showView(v) {
            document.getElementById('view-home').classList.toggle('hidden', v !== 'home');
            document.getElementById('view-cart').classList.toggle('hidden', v !== 'cart');
            window.scrollTo(0,0);
        }

        window.onload = () => filter('Todos', document.querySelector('.tab'));
    </script>
</body>
</html>
